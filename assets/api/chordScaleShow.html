    <div class="content" style="margin:auto;display:flex !important;justify-content:center;align-items:center;height:100%">

        <div class="card p-2 m-1 shadow-sm">
          <div><h4 class="fw-semibold text-dark mb-2">chordScaleShow : true</h4></div>
          <div class="canvasXpressContainerSite">
            <canvas id="chord_graphs_chordScaleShow_0" width="425" height="425" aspectRatio="1:1" responsive="true">
            </canvas>
          </div>
        </div>
      <script>
        new CanvasXpress("chord_graphs_chordScaleShow_0",
          [
            [
              "Id",
              "A",
              "B",
              "C",
              "D"
            ],
            [
              "A",
              11975,
              5871,
              8916,
              2868
            ],
            [

              1951,
              10048,
              2060,
              6171
            ],
            [

              8010,
              16145,
              8090,
              8045
            ],
            [
              "D",
              1013,
              990,
              940,
              6907
            ]
          ],  
          {
            "graphType": "Chord",
            "xAxis": [
              "A",
              "B",
              "C",
              "D"
            ],
            "chordScaleShow": true
          },  
          {
            "click": function(o, e, t) {
              t.showTooltipDiv(e, '<pre>' + t.prettyJSON(t.meta.config.user) + '</pre>', false, {zIndex: 1});
            }
          }
        );

      </script>
