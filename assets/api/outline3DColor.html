  <body style="height: 100vh;">

    <div class="content" style="margin:auto;display:flex !important;justify-content:center;align-items:center;height:100%">

      <div style="max-width:1000px;display:flex;flex-flow:wrap;">
        <div class="card p-2 m-1 shadow-sm">
          <div><h4 class="fw-semibold text-dark mb-2">outline3DColor : "#9e0adb"</h4></div>
          <div class="canvasXpressContainerSite">
            <canvas id="3d_attributes_outline3DColor_0" width="425" height="425" aspectRatio="1:1" responsive="true">
            </canvas>
          </div>
        </div>
      <script>
        new CanvasXpress("3d_attributes_outline3DColor_0",
          {
            "fx": "sin(2y) * cos(3x) / sec(xy)"
          },  
          {
            "graphType": "Scatter3D",
            "xAxis": [
              "Col1"
            ],
            "yAxis": [
              "Col2"
            ],
            "zAxis": [
              "Col3"
            ],
            "outline3DColor": "#9e0adb"
          },  
          {
            "click": function(o, e, t) {
              t.showTooltipDiv(e, '<pre>' + t.prettyJSON(t.meta.config.user) + '</pre>', false, {zIndex: 1});
            }
          }
        );

      </script>
