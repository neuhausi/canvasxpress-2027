<head>

    <meta property="og:title" content="CanvasXpress: Area Chart">
    <meta property="og:description" content="CanvasXpress: Visualizing Trends: Non-Uniform Area Graph iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">

    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="area15" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXarea15 = new CanvasXpress("area15",
          {
             "y" : {
                "data" : [
                  [1,2],
                  [3,5],
                  [5,1],
                  [2,3],
                  [4,6],
                  [6,7]
                ],
                "smps" : ["x","y"],
                "vars" : ["1","2","3","4","5","6"]
             },
             "z" : {
                "g" : ["a","a","a","b","b","b"]
             }
          },
          {
             "colorBy" : "g",
             "colorScheme" : "GGPlot",
             "graphType" : "Area",
             "theme" : "GGPlot",
             "xAxis" : ["x"],
             "yAxis" : ["y"]
          }
        );
      </script>
    </div>

  </body>

</html>
