<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanvasXpress: Area Chart</title>
    <meta name="description" content="CanvasXpress: 3 Series Stacked Wide Format Spline Area Graph iframe">
    <meta name="author" content="CanvasXpress Team">
    <meta name="theme-color" content="#fceecf" />
    
    <meta property="og:title" content="CanvasXpress: Area Chart">
    <meta property="og:description" content="CanvasXpress: 3 Series Stacked Wide Format Spline Area Graph iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    <meta property="og:url" content="https://www.canvasxpress.org/assets/examples/area-4.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="CanvasXpress">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CanvasXpress: Area Chart">
    <meta name="twitter:description" content="CanvasXpress: 3 Series Stacked Wide Format Spline Area Graph iframe">

    <link rel="canonical" href="https://www.canvasxpress.org/assets/examples/area-4.html">

    <link rel="stylesheet" href="/dist/build.css">
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="area4" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXarea4 = new CanvasXpress("area4",
          {
             "y" : {
                "data" : [
                  [10,11,13,4,18,21],
                  [5,6,10,12,15,10],
                  [2,3,6,4,8,6]
                ],
                "smps" : ["Jan","Feb","Mar","Apr","May","Jun"],
                "vars" : ["Series A","Series B","Series C"]
             }
          },
          {
             "areaType" : "stacked",
             "colorScheme" : "LastAirBenderWater",
             "graphOrientation" : "vertical",
             "graphType" : "Area",
             "lineType" : "spline",
             "smpTextRotate" : 90,
             "smpTitle" : "Month / First Quarters of 2024",
             "title" : "Area graph with three stacked data series",
             "titleScaleFontFactor" : 1.2,
             "xAxis" : ["Series A","Series B","Series C"],
             "xAxisTitle" : "Revenue (in Millions)"
          }
        );
      </script>
    </div>

  </body>

</html>
