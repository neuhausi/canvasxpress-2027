<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanvasXpress: AreaLine Chart</title>
    <meta name="description" content="CanvasXpress: Interactive Area-Line Graph iframe">
    <meta name="author" content="CanvasXpress Team">
    <meta name="theme-color" content="#fceecf" />
    
    <meta property="og:title" content="CanvasXpress: AreaLine Chart">
    <meta property="og:description" content="CanvasXpress: Interactive Area-Line Graph iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    <meta property="og:url" content="https://www.canvasxpress.org/assets/examples/arealine-1.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="CanvasXpress">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CanvasXpress: AreaLine Chart">
    <meta name="twitter:description" content="CanvasXpress: Interactive Area-Line Graph iframe">
    <meta name="twitter:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    
    <link rel="canonical" href="https://www.canvasxpress.org/assets/examples/arealine-1.html">

    <link rel="stylesheet" href="/dist/build.css">
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="arealine1" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXarealine1 = new CanvasXpress("arealine1",
          {
             "y" : {
                "data" : [
                  [10,11,13,4,18,21],
                  [5,8,10,12,15,10],
                  [2,3,6,4,8,6],
                  [18,27,29,21,42,37],
                  [6,9,9,6,14,12]
                ],
                "smps" : ["Jan","Feb","Mar","Apr","May","Jun"],
                "vars" : ["Series A","Series B","Series C","Series D","Series E"]
             }
          },
          {
             "graphOrientation" : "vertical",
             "graphType" : "AreaLine",
             "lineThickness" : 3,
             "lineType" : "spline",
             "objectColorTransparency" : 0.5,
             "setMaxX" : 50,
             "setMaxX2" : 50,
             "smpTextRotate" : 90,
             "smpTitle" : "Month",
             "xAxis" : ["Series A","Series B","Series C"],
             "xAxis2" : ["Series D","Series E"],
             "xAxisShow" : true,
             "xAxis2Show" : true
          }
        );
      </script>
    </div>

  </body>

</html>
