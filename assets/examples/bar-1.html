<head>

    <meta name="description" content="CanvasXpress: Simple Bar Graph for Easy Comparison iframe">
    <meta name="author" content="CanvasXpress Team">
    <meta name="theme-color" content="#fceecf" />
    
    <meta property="og:title" content="CanvasXpress: Bar Chart">
    <meta property="og:description" content="CanvasXpress: Simple Bar Graph for Easy Comparison iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">

    <meta name="twitter:card" content="summary_large_image">

    <link rel="stylesheet" href="/dist/build.css">
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />

</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="bar1" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXbar1 = new CanvasXpress("bar1",
          {
             "y" : {
                "data" : [
                  [4,5,4,4,7]
                ],
                "smps" : ["Cat 1","Cat 2","Cat 3","Cat 4","Cat 5"],
                "vars" : ["Var 1"]
             }
          },
          {
            "graphOrientation": "vertical",
            "graphType": "Bar",
            "showLegend": false,
            "smpTextRotate": 90,
            "smpTitle": "Categories",
            "title": "Bar graph with a single series",
            "xAxis": ["Var 1"],
            "xAxisTitle": "Var 1"
          }
        );
      </script>
    </div>

  </body>

</html>
