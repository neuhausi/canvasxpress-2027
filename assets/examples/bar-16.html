<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanvasXpress: Bar Chart</title>
    <meta name="description" content="CanvasXpress: Response-Based Swimmer Plot: SAS Analysis iframe">
    <meta name="author" content="CanvasXpress Team">
    <meta name="theme-color" content="#fceecf" />
    
    <meta property="og:title" content="CanvasXpress: Bar Chart">
    <meta property="og:description" content="CanvasXpress: Response-Based Swimmer Plot: SAS Analysis iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    <meta property="og:url" content="https://www.canvasxpress.org/assets/examples/bar-16.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="CanvasXpress">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CanvasXpress: Bar Chart">
    <meta name="twitter:description" content="CanvasXpress: Response-Based Swimmer Plot: SAS Analysis iframe">
    <meta name="twitter:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    
    <link rel="canonical" href="https://www.canvasxpress.org/assets/examples/bar-16.html">

    <link rel="stylesheet" href="/dist/build.css">
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="bar16" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXbar16 = new CanvasXpress("bar16",
          {
             "x" : {
                "Durable" : [false,false,false,true,false,false,false,false,true,false,true,true,false,true,true],
                "High Cap" : ["Arrow","Arrow","Arrow","Arrow","Arrow","Arrow","Arrow","Arrow","Arrow","Arrow",null,null,"Arrow",null,"Arrow"],
                "Response" : [20,10,10,-15,-15,-15,-20,-20,-22,-22,-25,-30,-42,-45,-50],
                "Stage" : ["Stage4","Stage2","Stage2","Stage1","Stage1","Stage1","Stage4","Stage4","Stage3","Stage3","Stage1","Stage3","Stage2","Stage2","Stage1"],
                "Status" : ["Partial Response","Partial Response","Partial Response","Complete Response","Complete Response","Partial Response","Partial Response","Partial Response","Partial Response","Partial Response","Complete Response","Complete Response","Complete Response","Complete Response","Complete Response"],
                "Subject" : ["S1","S2","S2","S3","S3","S3","S4","S4","S5","S5","S6","S7","S8","S9","S10"]
             },
             "y" : {
                "data" : [
                  [8.3,12.6,12.6,12.5,12.5,12.5,13.5,13.5,14,14,9.5,11.5,7.2,17,18.5],
                  [6,2.5,9.5,3.5,6.5,10.5,7,11.5,2.5,6,1,4.5,1.2,10.5,6.5],
                  [null,7,null,4.5,8.5,null,10,null,3.5,null,9.5,11.5,null,17,13.5]
                ],
                "smps" : ["S1","S2","S3","S4","S5","S6","S7","S8","S9","S10","S11","S12","S13","S14","S15"],
                "vars" : ["high","start","end"]
             }
          },
          {
            "barType": "swimmer",
            "colorBy": "Stage",
            "graphOrientation": "vertical",
            "graphType": "Bar",
            "groupingFactors": ["Subject"],
            "objectColorTransparency": 0.5,
            "smpOverlayProperties": {
              "Durable": {
                "position": "bottom"
              },
              "Response": {
                "position": "bottom",
                "thickness": 100,
                "type": "Bar"
              }
            },
            "sortData" : [
              ["cat", "smp", "Response"]
            ],
            "smpOverlays": ["Durable", "Response"],
            "smpTextRotate": 90,
            "swimDurable": "Durable",
            "swimEnd": "end",
            "swimHigh": "high",
            "swimHighCap": "High Cap",
            "swimStart": "start",
            "swimStatus": "Status",
            "title": "Tumor Response with Duration by Stage and Month",
            "xAxis": ["high", "start", "end"],
            "xAxisTitle": "Duration of Treatment in Months"
          }
        );
      </script>
    </div>

  </body>

</html>
