<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanvasXpress: Bar Chart</title>
    <meta name="description" content="CanvasXpress: Disney vs Pixar: Animated Movie Comparison iframe">
    <meta name="author" content="CanvasXpress Team">
    <meta name="theme-color" content="#fceecf" />
    
    <meta property="og:title" content="CanvasXpress: Bar Chart">
    <meta property="og:description" content="CanvasXpress: Disney vs Pixar: Animated Movie Comparison iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    <meta property="og:url" content="https://www.canvasxpress.org/assets/examples/bar-18.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="CanvasXpress">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CanvasXpress: Bar Chart">
    <meta name="twitter:description" content="CanvasXpress: Disney vs Pixar: Animated Movie Comparison iframe">
    <meta name="twitter:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    
    <link rel="canonical" href="https://www.canvasxpress.org/assets/examples/bar-18.html">

    <link rel="stylesheet" href="/dist/build.css">
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="bar18" width="600" height="550" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXbar18 = new CanvasXpress("bar18",
          {
             "y" : {
                "data" : [
                  [1,3,5,3,3,4,10,17,11,3]
                ],
                "smps" : ["30s","40s","50s","60s","70s","80s","90s","00s","10s","20s"],
                "vars" : ["Total"]
             }
          },
          {
             "backgroundType": "solid",
             "colorScheme": "Blues",
             "colors": [ "rgb(75,179,216)" ],
             "fontName": "Waltograph",
             "fontsExternal": [
                {
                   "name": "Waltograph",
                   "url": "https://www.canvasxpress.org/assets/fonts/waltograph42.otf"
                }
             ],
             "graphOrientation": "vertical",
             "graphType": "Bar",
             "marginBottom": 50,
             "marginLeft": 50,
             "marginRight": 50,
             "marginTop": 50,
             "maxTextSize": 80,
             "objectBorderColor": "rgba(255,255,255,0)",
             "plotBackgroundColor": "rgb(48,114,148)",
             "showLegend": false,
             "smpTextColor": "rgb(255,255,255)",
             "smpTextRotate": 90,
             "smpTextScaleFontFactor": 1.5,
             "title": "Animation Movies",
             "titleAlign": "center",
             "titleColor": "rgb(255,255,255)",
             "titleScaleFontFactor": 2.5,
             "xAxis": [ "Total" ],
             "xAxisShow": false,
             "xAxis2Show": false,
             "xAxisGridMajorShow": false,
             "xAxisGridMinorShow": false
          }
        );
      </script>
    </div>

  </body>

</html>
