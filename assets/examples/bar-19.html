<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanvasXpress: Bar Chart</title>
    <meta name="description" content="CanvasXpress: Movie Themes: Friendship, Love, Family Bar Graph iframe">
    <meta name="author" content="CanvasXpress Team">
    <meta name="theme-color" content="#fceecf" />
    
    <meta property="og:title" content="CanvasXpress: Bar Chart">
    <meta property="og:description" content="CanvasXpress: Movie Themes: Friendship, Love, Family Bar Graph iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    <meta property="og:url" content="https://www.canvasxpress.org/assets/examples/bar-19.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="CanvasXpress">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CanvasXpress: Bar Chart">
    <meta name="twitter:description" content="CanvasXpress: Movie Themes: Friendship, Love, Family Bar Graph iframe">
    <meta name="twitter:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    
    <link rel="canonical" href="https://www.canvasxpress.org/assets/examples/bar-19.html">

    <link rel="stylesheet" href="/dist/build.css">
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="bar19" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXbar19 = new CanvasXpress("bar19",
          {
             "x" : {
                "Color" : ["A","A","A","B","B","B","C","C","C"]
             },
             "y" : {
                "data" : [
                  [10,12,22,31,42,27,15,15,5]
                ],
                "smps" : ["Birth","Puberty","Death","Family","Friendship","Love","Work","Passion","Environment"],
                "vars" : ["Topic"]
             }
          },
          {
             "backgroundType" : "solid",
             "barType" : "bullet",
             "rangeColors" : ["rgb(48,126,164)"],
             "rangeColorTransparency" : 1,
             "bulletWidthRatio" : 1,
             "colorBy" : "Color",
             "colors" : ["rgb(250,165,44)","rgb(254,225,60)","rgb(253,243,169)"],
             "fontName" : "Waltograph",
             "fontsExternal": [
                {
                   "name": "Waltograph",
                   "url": "https://www.canvasxpress.org/assets/fonts/waltograph42.otf"
                }
             ],
             "graphType" : "Bar",
             "marginBottom" : 50,
             "marginLeft" : 50,
             "marginRight" : 50,
             "marginTop" : 50,
             "maxTextSize" : 80,
             "objectBorderColor" : "rgba(255,255,255,0)",
             "plotBackgroundColor" : "rgb(48,114,148)",
             "showLegend" : false,
             "smpTextColor" : "rgb(255,255,255)",
             "smpTextScaleFontFactor" : 2,
             "title" : "Friendship, Love, Family",
             "titleAlign" : "center",
             "titleColor" : "rgb(254,225,60)",
             "titleScaleFontFactor" : 2.5,
             "widthFactor" : 1.1,
             "xAxis": ["Topic"],
             "xAxisShow" : false,
             "xAxis2Show" : false,
             "xAxisGridMajorShow" : false,
             "xAxisGridMinorShow" : false
          }
        );
      </script>
    </div>

  </body>

</html>
