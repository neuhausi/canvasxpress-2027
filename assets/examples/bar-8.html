<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanvasXpress: Bar Chart</title>
    <meta name="description" content="CanvasXpress: Color-coded Bar Graph for Continuous Data iframe">
    <meta name="author" content="CanvasXpress Team">
    <meta name="theme-color" content="#fceecf" />
    
    <meta property="og:title" content="CanvasXpress: Bar Chart">
    <meta property="og:description" content="CanvasXpress: Color-coded Bar Graph for Continuous Data iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    <meta property="og:url" content="https://www.canvasxpress.org/assets/examples/bar-8.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="CanvasXpress">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CanvasXpress: Bar Chart">
    <meta name="twitter:description" content="CanvasXpress: Color-coded Bar Graph for Continuous Data iframe">
    <meta name="twitter:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    
    <link rel="canonical" href="https://www.canvasxpress.org/assets/examples/bar-8.html">

    <link rel="stylesheet" href="/dist/build.css">
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="bar8" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXbar8 = new CanvasXpress("bar8",
          {
             "x" : {
                "Drug Sensitivity" : ["Sensitive","Sensitive","Sensitive","Sensitive","Sensitive","Resistant","Resistant","Resistant"],
                "IC50" : [0.08,0.07,0.06,0.05,0.04,0.03,0.02,0.01]
             },
             "y" : {
                "data" : [
                  [10,15,20,30,40,70,80,90]
                ],
                "desc" : ["Intensity"],
                "smps" : ["S1","S2","S3","S4","S5","S6","S7","S8"],
                "vars" : ["V1"]
             }
          },
          {
            "colorBy": "IC50",
            "decorations": {
              "line": [
                {
                  "align": "left",
                  "color": "rgb(255,0,0)",
                  "label": "Cutoff",
                  "value": 50,
                  "width": 2
                }
              ]
            },
            "graphOrientation": "vertical",
            "graphType": "Bar",
            "smpOverlays": ["Drug Sensitivity"],
            "smpTextRotate": 90,
            "smpTitle": "Cell Lines",
            "title": "Sensitivity of cell lines to different drugs",
            "xAxis": ["V1"]
          }
        );
      </script>
    </div>

  </body>

</html>
