<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanvasXpress: Bar Chart</title>
    <meta name="description" content="CanvasXpress: 2021 Global Cancer Death Rates Visualized iframe">
    <meta name="author" content="CanvasXpress Team">
    <meta name="theme-color" content="#fceecf" />
    
    <meta property="og:title" content="CanvasXpress: Bar Chart">
    <meta property="og:description" content="CanvasXpress: 2021 Global Cancer Death Rates Visualized iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    <meta property="og:url" content="https://www.canvasxpress.org/assets/examples/bar-9.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="CanvasXpress">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CanvasXpress: Bar Chart">
    <meta name="twitter:description" content="CanvasXpress: 2021 Global Cancer Death Rates Visualized iframe">
    <meta name="twitter:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    
    <link rel="canonical" href="https://www.canvasxpress.org/assets/examples/bar-9.html">

    <link rel="stylesheet" href="/dist/build.css">
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="bar9" width="600" height="550" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXbar9 = new CanvasXpress("bar9",
          {
             "y" : {
                "data" : [
                  [25.6,13.2,12.1,8.5,6.8,6.4,6.1,5.5,4.1,3.8]
                ],
                "smps" : ["Lung, trachea, and bronchus","Colon and rectum","Stomach","Breast","Esophageal","Pancreas","Liver","Prostate","Leukmia","Cervical"],
                "vars" : ["Number of Deaths per 100000 people"]
             }
          },
          {
            "citation": "<b>Data source</b> :  IHME, Global Burden of Disease (2024)",
            "citationScaleFontFactor": 0.7,
            "dataTextColor": "#FFFFFF",
            "dataTextScaleFontFactor": 0.8,
            "dataValuesPosition": "inside",
            "graphOrientation": "horizontal",
            "graphType": "Bar",
            "maxSmpStringLen": 50,
            "showDataValues": true,
            "showLegend": false,
            "subtitle": " Estimated number of deaths from different types of cancer per 100,000 people.",
            "subtitleScaleFontFactor": 0.6,
            "title": "Cancer crude death rate by type, World, 2021",
            "widthFactor": 2,
            "xAxis": ["Number of Deaths per 100000 people"],
            "xAxisGridMajorShow": false,
            "xAxisShow": false
          }
        );
      </script>
    </div>

  </body>

</html>
