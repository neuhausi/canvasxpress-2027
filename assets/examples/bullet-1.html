    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />

</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="bullet1" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXbullet1 = new CanvasXpress("bullet1",
          {
            "y": {
              "data": [
                [ 19, 25, 52, 57, 31, 42 ],
                [ 15, 15, 15, 20, 20, 20 ],
                [ 35, 35, 35, 40, 40, 40 ],
                [ 70, 70, 70, 70, 70, 70 ],
                [ 46, 52, 42, 63, 56, 51 ]
              ],
              "smps": [ "S1", "S2", "S3", "S4", "S5", "S6" ],
              "vars": [ "V1", "V2", "V3", "V4", "V5" ]
            }
          },
          {
            "rangeColors": ["#777777", "#AAAAAA", "#DDDDDD"],
            "rangeStack": ["V2", "V3", "V4"],
            "bulletTargetVarName": "V5",
            "dataTextColor": "#000000",
            "dataValuesPosition": "inside",
            "graphOrientation": "horizontal",
            "graphType": "Bullet",
            "showDataValues": true,
            "showLegend": false,
            "xAxis": ["V1"]
          }
        );
      </script>
    </div>

  </body>

</html>
