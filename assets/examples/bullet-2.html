<head>

    <meta charset="UTF-8">

    <title>CanvasXpress: Bullet Chart</title>
    <meta name="description" content="CanvasXpress: Visualization in A 1x6 Bullet Graph Layout iframe">
    <meta name="author" content="CanvasXpress Team">
    <meta name="theme-color" content="#fceecf" />
    
    <meta property="og:title" content="CanvasXpress: Bullet Chart">
    <meta property="og:description" content="CanvasXpress: Visualization in A 1x6 Bullet Graph Layout iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    <meta property="og:url" content="https://www.canvasxpress.org/assets/examples/bullet-2.html">

    <link rel="stylesheet" href="/dist/build.css">
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="bullet2" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXbullet2 = new CanvasXpress("bullet2",
          {
            "y": {
              "data": [
                [ 19, 25, 52, 57, 31, 42 ],
                [ 15, 15, 15, 20, 20, 20 ],
                [ 35, 35, 35, 40, 40, 40 ],
                [ 70, 70, 70, 70, 70, 70 ],
                [ 46, 52, 42, 63, 56, 51 ]
              ],
              "smps": [ "S1", "S2", "S3", "S4", "S5", "S6" ],
              "vars": [ "V1", "V2", "V3", "V4", "V5" ]
            }
          },
          {
            "colors" : ["#3F3F3F"],
            "graphOrientation" : "vertical",
            "graphType" : "Bullet",
            "showDataValues" : true,
            "smpTextRotate": "90",
            "xAxis" : ["V1"],
            "rangeStack": ["V2", "V3", "V4"],
            "rangeColors": ["#945D55", "#C4A285", "#EBE7DE"],
            "bulletTargetVarName": "V5",
            "bulletTargetVarColor": "#3F3F3F",
            "segregateSamplesBy" : ["sample"],
            "layoutTopology" : "1X6",
            "layoutAdjust": true,
            "stripShow": false,
            "widthFactor": 2,
            "xAxisTextScaleFontFactor": 0.6
          }
        );
      </script>
    </div>

  </body>

</html>
