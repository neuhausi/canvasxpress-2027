<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="CanvasXpress: Visualization of Bullet Graphs iframe">
    <meta name="author" content="CanvasXpress Team">
    <meta name="theme-color" content="#fceecf" />
    
    <meta property="og:title" content="CanvasXpress: Bullet Chart">
    <meta property="og:description" content="CanvasXpress: Visualization of Bullet Graphs iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    <meta property="og:url" content="https://www.canvasxpress.org/assets/examples/bullet-4.html">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CanvasXpress: Bullet Chart">
    <meta name="twitter:description" content="CanvasXpress: Visualization of Bullet Graphs iframe">

    <link rel="canonical" href="https://www.canvasxpress.org/assets/examples/bullet-4.html">

    <link rel="stylesheet" href="/dist/build.css">
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="bullet4" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXbullet4 = new CanvasXpress("bullet4",
          {
            "y": {
              "data": [
                [230, 180, 185, 225, 80, 190],
                [100, 15, 35, 115, 95, 30],
                [150, 50, 70, 170, 135, 50],
                [250, 250, 250, 250, 250, 250],
                [234, 120, 150, 230, 175, 55]
              ],
              "smps": [ "USA", "Chile", "Brazil", "Canada", "Mexico", "Argentina" ],
              "vars": [ "Value", "Low", "Average", "High", "Target" ]
            }
          },
          {
            "colors" : ["#305DCB", "#E4EFFD", "#ADCFFA", "#73AFF8"],
            "dataValuesPosition" : "inside",
            "dataTextColor" : "#FFFFFF",
            "graphOrientation" : "horizontal",
            "graphType" : "Bullet",
            "showDataValues" : true,
            "xAxis" : ["Value"],
            "rangeStack": ["Low", "Average", "High"],
            "rangeColors": ["#73AFF8", "#ADCFFA", "#E4EFFD"],
            "bulletTargetVarName": "Target",
            "widthFactor": 2
          }
        );
      </script>
    </div>

  </body>

</html>
