<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanvasXpress: Bullet Chart</title>
    <meta name="description" content="CanvasXpress: Visualization with stylish Bullet Graphs iframe">
    <meta name="author" content="CanvasXpress Team">
    <meta name="theme-color" content="#fceecf" />
    
    <meta property="og:title" content="CanvasXpress: Bullet Chart">
    <meta property="og:description" content="CanvasXpress: Visualization with stylish Bullet Graphs iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    <meta property="og:url" content="https://www.canvasxpress.org/assets/examples/bullet-5.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="CanvasXpress">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CanvasXpress: Bullet Chart">
    <meta name="twitter:description" content="CanvasXpress: Visualization with stylish Bullet Graphs iframe">
    <meta name="twitter:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    
    <link rel="canonical" href="https://www.canvasxpress.org/assets/examples/bullet-5.html">

    <link rel="stylesheet" href="/dist/build.css">
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="bullet5" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXbullet5 = new CanvasXpress("bullet5",
          {
            "y": {
              "data": [
                [250.43, 5.69, 9.79],
                [250, 3, 8],
                [400, 6, 10],
                [600, 12, 11],
                [520, 7.5, 10.5]
              ],
              "smps": [ "Total Distance", "Average Distance", "Average Speed" ],
              "vars": [ "Value", "Bad", "Acceptable", "Good", "Target" ]
            }
          },
          {
            "barType": "bullet",
            "rangeColors": ["#FFFFFF","#F2F2F2","#D8D8D8"],
            "rangeStack": ["Bad","Acceptable","Good"], 
            "rangeStackShow": true,
            "bulletTargetType": "openCircle",
            "bulletTargetVarName": "Target",
            "bulletTargetWidthRatio": 0.2,
            "bulletStyle": "roundGradient",
            "bulletWidthRatio": 0.5,
            "colors" : ["#9422F5"],
            "dataValuesPosition" : "inside",
            "dataTextColor" : "#FFFFFF",
            "dataTextScaleFontFactor": 0.8,
            "graphOrientation" : "horizontal",
            "graphType" : "Bullet",
            "layoutAdjust": true,
            "layoutSpacing": 20,
            "layoutTopology": "3X1",
            "segregateSamplesBy" : ["sample"],
            "showDataValues": true,
            "showLegend": false,
            "showSampleNames": false,
            "stripBackgroundColor": "#FFFFFF",
            "stripTextAlign": "left",
            "stripTextColor": "#000000",
            "widthFactor": 15,
            "xAxis": ["Value"],
            "xAxis2Show": true,
            "xAxisGridMajorShow": false,
            "xAxisGridMinorShow": false,
            "xAxisShow": false
          }
        );
      </script>
    </div>

  </body>

</html>
