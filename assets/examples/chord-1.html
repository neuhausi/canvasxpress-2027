<head>

    <meta property="og:title" content="CanvasXpress: Chord Chart">
    <meta property="og:description" content="CanvasXpress: Visualize Relationships with Chord Graphs iframe">

    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="chord1" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXchord1 = new CanvasXpress("chord1",
          {
             "y" : {
                "data" : [
                  [11975,5871,8916,2868],
                  [1951,10048,2060,6171],
                  [8010,16145,8090,8045],
                  [1013,990,940,6907]
                ],
                "smps" : ["A","B","C","D"],
                "vars" : ["A","B","C","D"]
             }
          },
          {
             "circularArc" : 360,
             "circularRotate" : 0,
             "circularType" : "chord",
             "colors" : ["#000000","#FFDD89","#957244","#F26223"],
             "graphType" : "Circular",
             "higlightGreyOut" : true,
             "legendKeyBackgroundBorderColor" : "rgba(255,255,255,0)",
             "legendKeyBackgroundColor" : "rgba(255,255,255,0)",
             "objectBorderColor" : "rgb(0,0,0)",
             "rAxisTickFormat" : ["%sK"," / 1000"],
             "showTransition" : false,
             "title" : "Simple Chord Graph",
             "transitionStep" : 50,
             "transitionTime" : 1500
          }
        );
      </script>
    </div>

  </body>

</html>
