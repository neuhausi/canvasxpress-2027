<head>

    <meta name="description" content="CanvasXpress: Round-Robin Tournament Visualization with Chord Graph iframe">
    <meta name="author" content="CanvasXpress Team">
    <meta name="theme-color" content="#fceecf" />
    
    <meta property="og:title" content="CanvasXpress: Chord Chart">
    <meta property="og:description" content="CanvasXpress: Round-Robin Tournament Visualization with Chord Graph iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    <meta property="og:url" content="https://www.canvasxpress.org/assets/examples/chord-4.html">

    <meta name="twitter:card" content="summary_large_image">

    <link rel="stylesheet" href="/dist/build.css">
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="chord4" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXchord4 = new CanvasXpress("chord4",
          {
             "y" : {
                "data" : [
                   [0,8,8,8],
                   [1,0,8,1],
                   [1,1,0,8],
                   [1,8,1,0]
                ],
                "smps" : ["A","B","C","D"],
                "vars" : ["A","B","C","D"]
             }
          },
          {
            "chordColor": "largest",
            "chordScaleShow": false,
            "circularArc": 360,
            "circularRotate": 180,
            "circularType": "chord",
            "graphType": "Circular",
            "higlightGreyOut": true,
            "legendKeyBackgroundBorderColor": "rgba(255,255,255,0)",
            "legendKeyBackgroundColor": "rgba(255,255,255,0)",
            "objectBorderColor": "rgb(0,0,0)",
            "title": "Four way Round Robin Tournament"
          }
        );
      </script>
    </div>

  </body>

</html>
