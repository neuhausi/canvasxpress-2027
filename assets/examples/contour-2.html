<!DOCTYPE html>

<head>

    <meta charset="UTF-8">

    <meta name="description" content="CanvasXpress: Visualizing Z Values with Contour Plot iframe">

    <meta name="theme-color" content="#fceecf" />
    
    <meta property="og:title" content="CanvasXpress: Contour Chart">
    <meta property="og:description" content="CanvasXpress: Visualizing Z Values with Contour Plot iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    <meta property="og:url" content="https://www.canvasxpress.org/assets/examples/contour-2.html">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CanvasXpress: Contour Chart">

    <link rel="stylesheet" href="/dist/build.css">
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="contour2" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXcontour2 = new CanvasXpress("contour2",
          {
             "y" : {
                "data" : [
                  [20,15.625,12.5,10.625,10],
                  [15.625,11.25,8.125,6.25,5.625],
                  [12.5,8.125,5,3.125,2.5],
                  [10.625,6.25,3.125,1.25,0.625],
                  [10,5.625,2.5,0.625,0]
                ],
                "smps" : ["s1","s2","s3","s4","s5"],
                "vars" : ["v1","v2","v3","v4","v5"]
             }
          },
          {
             "contourType" : "normal",
             "graphType" : "Heatmap",
             "heatmapCellBox" : false,
             "showSampleNames" : false,
             "showVariableNames" : false,
             "title" : "Basic Contour Plot",
             "xAxis" : ["v1","v2","v3","v4","v5"]
          },
          false,
          false,
          [
            [
              "createContour",
              []
            ]
          ]
        );
      </script>
    </div>

  </body>

</html>
