<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanvasXpress: Contour Chart</title>
    <meta name="description" content="CanvasXpress: Customized Three-Column Dataset Visualization iframe">
    <meta name="author" content="CanvasXpress Team">
    <meta name="theme-color" content="#fceecf" />
    
    <meta property="og:title" content="CanvasXpress: Contour Chart">
    <meta property="og:description" content="CanvasXpress: Customized Three-Column Dataset Visualization iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    <meta property="og:url" content="https://www.canvasxpress.org/assets/examples/contour-4.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="CanvasXpress">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CanvasXpress: Contour Chart">
    <meta name="twitter:description" content="CanvasXpress: Customized Three-Column Dataset Visualization iframe">
    <meta name="twitter:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    
    <link rel="canonical" href="https://www.canvasxpress.org/assets/examples/contour-4.html">

    <link rel="stylesheet" href="/dist/build.css">
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="contour4" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXcontour4 = new CanvasXpress("contour4",
          {
             "y" : {
                "data" : [
                  [-9,0,10],
                  [-9,1,5.625],
                  [-9,4,2.5],
                  [-9,5,0.625],
                  [-9,7,0],
                  [-6,0,10.625],
                  [-6,1,6.25],
                  [-6,4,3.125],
                  [-6,5,1.25],
                  [-6,7,0.625],
                  [-5,0,12.5],
                  [-5,1,8.125],
                  [-5,4,5],
                  [-5,5,3.125],
                  [-5,7,2.5],
                  [-3,0,15.625],
                  [-3,1,11.25],
                  [-3,4,8.125],
                  [-3,5,6.25],
                  [-3,7,5.625],
                  [-1,0,20],
                  [-1,1,15.625],
                  [-1,4,12.5],
                  [-1,5,10.625],
                  [-1,7,10]
                ],
                "smps" : ["s1","s2","s3"],
                "vars" : ["v1","v2","v3","v4","v5","v6","v7","v8","v9","v10","v11","v12","v13","v14","v15","v16","v17","v18","v19","v20","v21","v22","v23","v24","v25"]
             }
          },
          {
             "contourFilled" : true,
             "contourType" : "normal",
             "graphType" : "ScatterBubble2D",
             "title" : "Custom Contour Plot",
             "xAxis" : ["s1"],
             "yAxis" : ["s2"],
             "zAxis" : ["s3"]
          },
          false,
          false,
          [
            [
              "createContour",
              []
            ]
          ]
        );
      </script>
    </div>

  </body>

</html>
