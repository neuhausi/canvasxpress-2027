<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanvasXpress: Contour Chart</title>
    <meta name="description" content="CanvasXpress: Smooth Data Contour Plot iframe">
    <meta name="author" content="CanvasXpress Team">
    <meta name="theme-color" content="#fceecf" />
    
    <meta property="og:title" content="CanvasXpress: Contour Chart">
    <meta property="og:description" content="CanvasXpress: Smooth Data Contour Plot iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    <meta property="og:url" content="https://www.canvasxpress.org/assets/examples/contour-5.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="CanvasXpress">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CanvasXpress: Contour Chart">
    <meta name="twitter:description" content="CanvasXpress: Smooth Data Contour Plot iframe">
    <meta name="twitter:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    
    <link rel="canonical" href="https://www.canvasxpress.org/assets/examples/contour-5.html">

    <link rel="stylesheet" href="/dist/build.css">
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="contour5" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXcontour5 = new CanvasXpress("contour5",
          {
             "y" : {
                "data" : [
                  [16,17,18,19,19,21,22],
                  [15,16,17,18,20,21,23],
                  [14,13,14,15,18,21,24],
                  [13,12,11,13,16,23,25],
                  [12,11,7,8,9,27,26],
                  [7,6,7,8,10,5,17],
                  [4,1,2,3,4,10,14],
                  [2,3,4,5,7,9,11]
                ],
                "smps" : ["s1","s2","s3","s4","s5","s6","s7"],
                "vars" : ["v1","v2","v3","v4","v5","v6","v7","v8"]
             }
          },
          {
             "contourType" : "normal",
             "graphType" : "Heatmap",
             "heatmapCellBox" : false,
             "lineType" : "spline",
             "showContourLevel" : false,
             "showSampleNames" : false,
             "showVariableNames" : false,
             "xAxis" : ["v1","v2","v3","v4","v5","v6","v7","v8"]
          },
          false,
          false,
          [
            [
              "createContour",
              []
            ]
          ]
        );
      </script>
    </div>

  </body>

</html>
