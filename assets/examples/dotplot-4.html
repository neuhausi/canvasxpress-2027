<head>

    <meta property="og:title" content="CanvasXpress: Dotplot Chart">
    <meta property="og:description" content="CanvasXpress: Master Data Visualization with Dot Plots iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">

    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="dotplot4" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXdotplot4 = new CanvasXpress("dotplot4",
          {
             "y" : {
                "data" : [
                  [94,96,112,92,90,78,94,76,79,86,93,84,67,73,80,62,72,71,68,64,72],
                  [152,151,165,141,137,118,131,112,114,119,124,114,94,100,107,84,92,88,82,78,81]
                ],
                "smps" : ["MIT","Stanford","Harvard","U.Penn","Princeton","Chicago","Georgetown","Tufts","Yale","Columbia","Duke","Dartmouth","NYU","Notre Dame","Cornell","Michigan","Brown","Berkeley","Emory","UCLA","SoCal"],
                "vars" : ["Women","Men"]
             }
          },
          {
            "axisAlgorithm": "wilkinson",
            "dataPointSizeScaleFactor": 3,
            "dataTextScaleFontFactor": 0.6,
            "dotplotType": "stacked",
            "graphType": "Dotplot",
            "plotStyle": "open",
            "showDataValues": true,
            "smpTitle": "School",
            "sortDir": "descending",
            "title": "Gender Earnings Disparity",
            "xAxis": ["Women", "Men"],
            "xAxis2Title": "Annual Salary",
            "xAxisGridMinorShow": false,
            "xAxisTickFormat": "$%sK",
            "xAxisTitle": "Annual Salary"
          },
          false,
          false,
          [
            [
              "sortSamplesByVariable",
              ["Men"]
            ]
          ]
        );
      </script>
    </div>

  </body>

</html>
