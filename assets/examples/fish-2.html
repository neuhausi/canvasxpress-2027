  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="fish2" width="600" height="450" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXfish2 = new CanvasXpress("fish2",
          {
             "y" : {
                "data" : [
                  [100,2,2,100],
                  [38,0,0,0],
                  [24,1,1,98],
                  [0,0,1,30]
                ],
                "smps" : [0,30,200,423],
                "vars" : ["C1","C2","C3","C4"]
             }
          },
          {
             "backgroundType" : "panelSolidGradient",
             "colorSpectrum" : ["bisque","darkgoldenrod1","darkorange3"],
             "colors" : ["rgb(136,136,136)","rgb(239,0,0)","rgb(255,96,0)","rgb(255,207,0)","rgb(191,255,64)","rgb(80,255,175)","rgb(0,223,255)","rgb(0,112,255)","rgb(0,0,255)","rgb(0,0,143)"],
             "fishAxis" : [0,423],
             "fishCloneLabels" : ["DNMT3A,FLT3","NPM1","MET","ETV6,WNK1-WAC,\\nMYO18B"],
             "fishParents" : [0,1,1,3],
             "fishShape" : "spline",
             "fishTimepoints" : [0,30,200,423],
             "gradientOrientation" : "horizontal",
             "graphType" : "Fish",
             "legendKeyBackgroundBorderColor" : "rgba(255,255,255,0)",
             "legendKeyBackgroundColor" : "rgba(255,255,255,0)",
             "varTextColor" : "green",
             "varTextRotate" : 30,
             "xAxis" : ["C1","C2","C3","C4"]
          }
        );
      </script>
    </div>

  </body>
