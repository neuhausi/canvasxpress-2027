  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="fish3" width="600" height="450" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXfish3 = new CanvasXpress("fish3",
          {
             "y" : {
                "data" : [
                  [100,100],
                  [98,44],
                  [46,1],
                  [1,55]
                ],
                "smps" : ["Primary","Post-AI"],
                "vars" : ["S1","S2","S3","S4"]
             }
          },
          {
             "backgroundType" : "panelSolidGradient",
             "colorSpectrum" : ["#ffe4c4","#ffb90f","#cd6600"],
             "colors" : ["#1B9E77","#D95F02","#7570B3","#E7298A"],
             "fishAxis" : [0,120],
             "fishAxisLabels" : ["Primary","Post-AI"],
             "fishParents" : [0,1,2,1],
             "fishShape" : "polygon",
             "fishTimepoints" : [0,120],
             "gradientOrientation" : "horizontal",
             "graphType" : "Fish",
             "legendKeyBackgroundBorderColor" : "rgba(255,255,255,0)",
             "legendKeyBackgroundColor" : "rgba(255,255,255,0)",
             "title" : "BRC32",
             "xAxis": ["S1","S2","S3","S4"]
          }
        );
      </script>
    </div>

  </body>
