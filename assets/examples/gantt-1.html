  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="gantt1" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXgantt1 = new CanvasXpress("gantt1",
          {
             "y" : {
                "data" : [
                  [20140221,20140521,20140821,20141121,20150221,20150521],
                  [20140520,20140820,20141120,20150220,20150520,20150820]
                ],
                "smps" : ["S01","S02","S03","S04","S05","S06"],
                "vars" : ["Start","End"]
             }
          },
          {
            "blockContrast": true,
            "ganttEnd": "End",
            "ganttStart": "Start",
            "graphType": "Gantt",
            "xAxis": ["Start", "End"]
          }
        );
      </script>
    </div>

  </body>
