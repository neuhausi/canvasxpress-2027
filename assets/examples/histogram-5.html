<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="description" content="CanvasXpress: Staggered Bar Histograms: Visual Data Distribution iframe">
    <meta name="author" content="CanvasXpress Team">
    <meta name="theme-color" content="#fceecf" />
    
    <meta property="og:title" content="CanvasXpress: Histogram Chart">
    <meta property="og:description" content="CanvasXpress: Staggered Bar Histograms: Visual Data Distribution iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    <meta property="og:url" content="https://www.canvasxpress.org/assets/examples/histogram-5.html">
    <meta property="og:type" content="website">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CanvasXpress: Histogram Chart">

    <link rel="stylesheet" href="/dist/build.css">
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="histogram5" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXhistogram5 = new CanvasXpress("histogram5",
          {
             "y" : {
                "data" : [
                  [6.47,4.03],
                  [6.13,3.76],
                  [6.19,3.77],
                  [4.89,3.34],
                  [5.63,3.47],
                  [4.52,2.92],
                  [5.89,3.2],
                  [4.79,2.71],
                  [3.53,3.53],
                  [6.08,4.51],
                  [4.02,4.56]
                ],
                "smps" : ["Alcohol","Tobacco"],
                "vars" : ["North","Yorkshire","Northeast","East Midlands","West Midlands","East Anglia","Southeast","Southwest","Wales","Scotland","Northern Ireland"]
             }
          },
          {
            "citation": "Moore, David S., and George P. McCabe (1989). Introduction to the Practice of Statistics, p. 179.",
            "graphType": "Scatter2D",
            "histogramBins": 5,
            "histogramType": "staggered",
            "showHistogram": true,
            "title": "Average weekly household spending, in British pounds, on tobacco products\\nand alcoholic beverages for each of the 11 regions of Great Britain.",
            "xAxis": ["Tobacco", "Alcohol"],
            "xAxisTitle": "Pounds Spent",
            "yAxisTitle": "Frequency"
          }
        );
      </script>
    </div>

  </body>

</html>
