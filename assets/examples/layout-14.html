<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <title>CanvasXpress: Layout Chart</title>
    <meta name="description" content="CanvasXpress: Faceted Plots Enhance Data Comparison iframe">
    <meta name="author" content="CanvasXpress Team">
    <meta name="theme-color" content="#fceecf" />
    
    <meta property="og:title" content="CanvasXpress: Layout Chart">
    <meta property="og:description" content="CanvasXpress: Faceted Plots Enhance Data Comparison iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    <meta property="og:url" content="https://www.canvasxpress.org/assets/examples/layout-14.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="CanvasXpress">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CanvasXpress: Layout Chart">
    <meta name="twitter:description" content="CanvasXpress: Faceted Plots Enhance Data Comparison iframe">
    <meta name="twitter:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    
    <link rel="canonical" href="https://www.canvasxpress.org/assets/examples/layout-14.html">

    <link rel="stylesheet" href="/dist/build.css">
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="layout14" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXlayout14 = new CanvasXpress("layout14",
          {
             "x" : {
                "Code" : ["FL","DLBCL","DLBCL","FL","FL","DLBCL","DLBCL","DLBCL","DLBCL","DLBCL","FL","FL","FL","DLBCL","FL","DLBCL","DLBCL","DLBCL","FL","DLBCL"],
                "Drug" : ["4 mg","2 mg","3 F6 mg","4 mg","3 F6 mg","3 F6 mg","2 mg","2 mg","2 mg","2 mg","1 mg","4 F6 mg","3 F6 mg","4 F6 mg","3 F6 mg","2 mg","2 mg","1 mg","3 F6 mg","4 mg"]
             },
             "y" : {
                "data" : [
                  [4.8,33.9,40.1,6.9,28.8,40.5,31.2,40,41.8,29.7,1.5,10,45.5,14.9,26.7,29.9,5.6,10.7,25.9,20.8],
                  [null,null,null,null,null,35.5,null,35,null,null,null,5,null,null,21.7,null,0.6,null,null,null],
                  [29.3,23,19.6,14,5.2,-1.4,-2.8,-6.9,-6.9,-7.1,-13.2,-13.9,-14.5,-16.6,-27.2,-33.9,-43.5,-43.7,-51.4,-52.6],
                  [192.7,175.1,93.2,172,121.4,77.1,33.7,73.6,188.6,122.8,80.8,32.5,183.4,87.2,43.5,46.6,115.4,99.9,180.5,130.3]
                ],
                "vars" : ["Duration","Discontinued","Response","Baseline"]
             },
             "z" : {
                "Panel" : [1,1,2,3]
             }
          },
          {
            "graphOrientation": "vertical",
            "graphType": "Bar",
            "layoutAdjust": true,
            "layoutConfig": [
              {
                "axisCoordinate": true,
                "graphType": "BarLine",
                "showDataValues": true,
                "xAxis": ["Duration"],
                "xAxis2": ["Discontinued"],
                "xAxisTitle": "Duration of Treatment"
              },
              {
                "colorBy": "Drug",
                "legendColumns": 5,
                "legendInside": true,
                "legendPosition": "bottomLeft",
                "showLegend": true,
                "showLegendTitle": false,
                "xAxisTitle": "Change from Baseline (%)"
              },
              {
                "barLollipopFactor": 1.5,
                "barLollipopOpen": false,
                "barType": "lollipop",
                "xAxisTitle": "Baseline (mm)"
              }
            ],
            "layoutTopology": "3X1",
            "showLegend": false,
            "stripBackgroundBorderColor": "rgba(0,0,0,0)",
            "stripShow": false,
            "stripTextColor": "rgb(0,0,0)",
            "title": "Tumor Response and Duration by Subject Id",
            "xAxis": ["Duration", "Discontinued", "Response", "Baseline"],
            "xAxis2Show": false
          },
          false,
          false,
          [
            [
              "segregateVariables",
              ["Panel"]
            ]
          ]
        );
      </script>
    </div>

  </body>

</html>
