<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanvasXpress: Lollipop Chart</title>
    <meta name="description" content="CanvasXpress: Colorful Lollipop Chart for Data Visualization iframe">
    <meta name="author" content="CanvasXpress Team">
    <meta name="theme-color" content="#fceecf" />
    
    <meta property="og:title" content="CanvasXpress: Lollipop Chart">
    <meta property="og:description" content="CanvasXpress: Colorful Lollipop Chart for Data Visualization iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    <meta property="og:url" content="https://www.canvasxpress.org/assets/examples/lollipop-2.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="CanvasXpress">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CanvasXpress: Lollipop Chart">
    <meta name="twitter:description" content="CanvasXpress: Colorful Lollipop Chart for Data Visualization iframe">
    <meta name="twitter:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    
    <link rel="canonical" href="https://www.canvasxpress.org/assets/examples/lollipop-2.html">

    <link rel="stylesheet" href="/dist/build.css">
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="lollipop2" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXlollipop2 = new CanvasXpress("lollipop2",
          {
             "x" : {
                "Color" : ["A","B","C","D","E","F"]
             },
             "y" : {
                "data" : [
                  [-40,-85,-60,50,75,100]
                ],
                "smps" : ["Engineering","Biology","Computer","Psycology","Education","Health"],
                "vars" : ["Var1"]
             }
          },
          {
             "barLollipopOpen" : true,
             "barType" : "lollipopBullet",
             "colorBy" : "Color",
             "colorScheme" : "GGPlot",
             "dataPointSizeScaleFactor" : 7,
             "graphType" : "Bar",
             "marginBottom" : 50,
             "marginLeft" : 50,
             "marginRight" : 50,
             "marginTop" : 50,
             "maxTextSize" : 80,
             "rangeColors" : ["rgb(200,200,200)"],
             "setMaxX" : 150,
             "setMinX" : -150,
             "showDataValues" : true,
             "showLegend" : false,
             "title" : "Occupations",
             "xAxis2Show" : false,
             "xAxisGridMajorShow" : false,
             "xAxisGridMinorShow" : false,
             "xAxisShow" : false,
             "xAxis" : ["Var1"]
          }
        );
      </script>
    </div>

  </body>

</html>
