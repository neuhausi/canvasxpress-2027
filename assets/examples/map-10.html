<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanvasXpress: Map Chart</title>
    <meta name="description" content="CanvasXpress: Customizable Italy Map Data in CanvasXpress iframe">
    <meta name="author" content="CanvasXpress Team">
    <meta name="theme-color" content="#fceecf" />
    
    <meta property="og:title" content="CanvasXpress: Map Chart">
    <meta property="og:description" content="CanvasXpress: Customizable Italy Map Data in CanvasXpress iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    <meta property="og:url" content="https://www.canvasxpress.org/assets/examples/map-10.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="CanvasXpress">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CanvasXpress: Map Chart">
    <meta name="twitter:description" content="CanvasXpress: Customizable Italy Map Data in CanvasXpress iframe">
    <meta name="twitter:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    
    <link rel="canonical" href="https://www.canvasxpress.org/assets/examples/map-10.html">

    <link rel="stylesheet" href="/dist/build.css">
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="map10" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXmap10 = new CanvasXpress("map10",
          false,
          {
             "colorBy" : "variable",
             "colorScheme" : "Light",
             "graphType" : "Map",
             "legendInside": true,
             "legendPosition" : "bottomLeft",
             "legendTextScaleFontFactor" : 0.85,
             "mapId" : "italy",
             "topoJSON" : "https://www.canvasxpress.org/data/maps/ITA.json"
          }
        );
      </script>
    </div>

  </body>

</html>
