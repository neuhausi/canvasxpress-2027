<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanvasXpress: Map Chart</title>
    <meta name="description" content="CanvasXpress: Custom State Map: Low-Res USA Map for Analysis iframe">
    <meta name="author" content="CanvasXpress Team">
    <meta name="theme-color" content="#fceecf" />
    
    <meta property="og:title" content="CanvasXpress: Map Chart">
    <meta property="og:description" content="CanvasXpress: Custom State Map: Low-Res USA Map for Analysis iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    <meta property="og:url" content="https://www.canvasxpress.org/assets/examples/map-12.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="CanvasXpress">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CanvasXpress: Map Chart">
    <meta name="twitter:description" content="CanvasXpress: Custom State Map: Low-Res USA Map for Analysis iframe">
    <meta name="twitter:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    
    <link rel="canonical" href="https://www.canvasxpress.org/assets/examples/map-12.html">

    <link rel="stylesheet" href="/dist/build.css">
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="map12" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXmap12 = new CanvasXpress("map12",
          false,
          {
             "colorBy" : "Order",
             "graphType" : "Map",
             "mapConfig" : {
                "zoom" : 3.2
             },
             "mapConfigFeatures" : {
                "1" : {
                   "scale" : [0.5,0.8],
                   "translate" : [-100,-30]
                },
                "11" : {
                   "scale" : [1.5,1.5],
                   "translate" : [85,-5]
                }
             },
             "mapId" : "customUSA",
             "topoJSON" : "https://www.canvasxpress.org/data/maps/USA.json"
          }
        );
      </script>
    </div>

  </body>

</html>
