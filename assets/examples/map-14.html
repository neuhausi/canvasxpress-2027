<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanvasXpress: Map Chart</title>
    <meta name="description" content="CanvasXpress: Leaflet Maps in CanvasXpress iframe">
    <meta name="author" content="CanvasXpress Team">
    <meta name="theme-color" content="#fceecf" />
    
    <meta property="og:title" content="CanvasXpress: Map Chart">
    <meta property="og:description" content="CanvasXpress: Leaflet Maps in CanvasXpress iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    <meta property="og:url" content="https://www.canvasxpress.org/assets/examples/map-14.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="CanvasXpress">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CanvasXpress: Map Chart">
    <meta name="twitter:description" content="CanvasXpress: Leaflet Maps in CanvasXpress iframe">
    <meta name="twitter:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    
    <link rel="canonical" href="https://www.canvasxpress.org/assets/examples/map-14.html">

    <link rel="stylesheet" href="/dist/build.css">
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="map14" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXmap14 = new CanvasXpress("map14",
          false,
          {
             "decorations" : {
                "marker" : [{"color" : "blue","coords" : [40.701,-73.985],
                      "label" : "New York 1",
                      "shape" : "circle",
                      "size" : 1
                   },
                   {
                      "color" : "red",
                      "coords" : [40.702,-74.011],
                      "label" : "New York 2",
                      "shape" : "teardrop",
                      "size" : 1.5
                   },
                   {
                      "color" : "green",
                      "coords" : [40.703,-73.991],
                      "label" : "New York 3",
                      "shape" : "star",
                      "size" : 3
                   }
                ]
             },
             "graphType" : "Map",
             "mapConfig" : {
                "center" : [40.7,-74],
                "zoom" : 15
             },
             "showLegend" : false,
             "useLeaflet" : true
          }
        );
      </script>
    </div>

  </body>

</html>
