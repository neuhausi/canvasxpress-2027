<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanvasXpress: Map Chart</title>
    <meta name="description" content="CanvasXpress: Customizable Leaflet Map with Interactive Markers iframe">
    <meta name="author" content="CanvasXpress Team">
    <meta name="theme-color" content="#fceecf" />
    
    <meta property="og:title" content="CanvasXpress: Map Chart">
    <meta property="og:description" content="CanvasXpress: Customizable Leaflet Map with Interactive Markers iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    <meta property="og:url" content="https://www.canvasxpress.org/assets/examples/map-15.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="CanvasXpress">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CanvasXpress: Map Chart">
    <meta name="twitter:description" content="CanvasXpress: Customizable Leaflet Map with Interactive Markers iframe">
    <meta name="twitter:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    
    <link rel="canonical" href="https://www.canvasxpress.org/assets/examples/map-15.html">

    <link rel="stylesheet" href="/dist/build.css">
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="map15" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXmap15 = new CanvasXpress("map15",
          {
             "x" : {
                "Latitude" : [40.701,40.702,40.703],
                "Longitude" : [-73.985,-74.011,-73.991],
                "color" : ["blue","red","green"],
                "shape" : ["circle","teardrop","star"],
                "size" : [1,1.5,3]
             },
             "y" : {
                "smps" : ["New York 1","New York 2","New York 3"]
             }
          },
          {
             "graphType" : "Map",
             "mapConfig" : {
                "center" : [40.7,-74],
                "zoom" : 15
             },
             "markerBy" : "shape",
             "showLegend" : false,
             "useLeaflet" : true
          }
        );
      </script>
    </div>

  </body>

</html>
