<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanvasXpress: Map Chart</title>
    <meta name="description" content="CanvasXpress: Advanced Country Mapping with CanvasXpress TopoJSON iframe">
    <meta name="author" content="CanvasXpress Team">
    <meta name="theme-color" content="#fceecf" />
    
    <meta property="og:title" content="CanvasXpress: Map Chart">
    <meta property="og:description" content="CanvasXpress: Advanced Country Mapping with CanvasXpress TopoJSON iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    <meta property="og:url" content="https://www.canvasxpress.org/assets/examples/map-3.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="CanvasXpress">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CanvasXpress: Map Chart">
    <meta name="twitter:description" content="CanvasXpress: Advanced Country Mapping with CanvasXpress TopoJSON iframe">
    <meta name="twitter:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    
    <link rel="canonical" href="https://www.canvasxpress.org/assets/examples/map-3.html">

    <link rel="stylesheet" href="/dist/build.css">
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="map3" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXmap3 = new CanvasXpress("map3",
          false,
          {
             "colorBy" : "variable",
             "decorations" : {
                "connections" : [{"color" : "red","source" : [40.7,-74],
                      "target" : [37.7,-122],
                      "type" : "spline"
                   },
                   {
                      "color" : "red",
                      "source" : [40.7,-74],
                      "target" : [25.7,-80.1],
                      "type" : "spline"
                   },
                   {
                      "color" : "red",
                      "source" : [37.7,-122],
                      "target" : [25.7,-80.1],
                      "type" : "splineDashed"
                   }
                ],
                "marker" : [{"color" : "blue","coords" : [40.7,-74],
                      "label" : "New York",
                      "shape" : "teardrop",
                      "size" : 5
                   },
                   {
                      "color" : "blue",
                      "coords" : [37.7,-122],
                      "label" : "San Francisco",
                      "shape" : "teardrop",
                      "size" : 5
                   },
                   {
                      "color" : "blue",
                      "coords" : [25.7,-80.1],
                      "label" : "Miami",
                      "shape" : "teardrop",
                      "size" : 5
                   },
                   {
                      "color" : "green",
                      "coords" : [41.8,-87.6],
                      "label" : "Chicago",
                      "shape" : "circle",
                      "size" : 4
                   },
                   {
                      "color" : "green",
                      "coords" : [36.1,-115.1],
                      "label" : "Las Vegas",
                      "shape" : "circle",
                      "size" : 3
                   },
                   {
                      "color" : "black",
                      "coords" : [42.3,-71],
                      "label" : "Boston",
                      "shape" : "star",
                      "size" : 6
                   }
                ]
             },
             "graphType" : "Map",
             "mapConfig" : {
                "center" : [34.7,-96.1],
                "zoom" : 3.2
             },
             "mapId" : "colorCountries",
             "showLegend" : false,
             "topoJSON" : "https://www.canvasxpress.org/data/maps/WORLD.json"
          }
        );
      </script>
    </div>

  </body>

</html>
