<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanvasXpress: Meter Chart</title>
    <meta name="description" content="CanvasXpress: Dynamic Meter Graph for Monitoring iframe">
    <meta name="author" content="CanvasXpress Team">
    <meta name="theme-color" content="#fceecf" />
    
    <meta property="og:title" content="CanvasXpress: Meter Chart">
    <meta property="og:description" content="CanvasXpress: Dynamic Meter Graph for Monitoring iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    <meta property="og:url" content="https://www.canvasxpress.org/assets/examples/meter-5.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="CanvasXpress">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CanvasXpress: Meter Chart">
    <meta name="twitter:description" content="CanvasXpress: Dynamic Meter Graph for Monitoring iframe">
    <meta name="twitter:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    
    <link rel="canonical" href="https://www.canvasxpress.org/assets/examples/meter-5.html">

    <link rel="stylesheet" href="/dist/build.css">
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="meter5" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXmeter5 = new CanvasXpress("meter5",
          {
             "y" : {
                "data" : [
                  [85]
                ],
                "smps" : ["January"],
                "vars" : ["Performance"]
             }
          },
          {
             "graphType" : "Meter",
             "setMax" : 100,
             "setMin" : 0,
             "meterType" : "horizontal",
             "xAxis" : ["Performance"]
          }
        );
      </script>
    </div>

  </body>

</html>
