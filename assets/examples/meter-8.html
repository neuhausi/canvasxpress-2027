<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="description" content="CanvasXpress: Interactive Meter Graph for Metadata & Levels iframe">
    <meta name="author" content="CanvasXpress Team">
    <meta name="theme-color" content="#fceecf" />
    
    <meta property="og:title" content="CanvasXpress: Meter Chart">
    <meta property="og:description" content="CanvasXpress: Interactive Meter Graph for Metadata & Levels iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    <meta property="og:url" content="https://www.canvasxpress.org/assets/examples/meter-8.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="CanvasXpress">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CanvasXpress: Meter Chart">
    <meta name="twitter:description" content="CanvasXpress: Interactive Meter Graph for Metadata & Levels iframe">

    <link rel="stylesheet" href="/dist/build.css">
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="meter8" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXmeter8 = new CanvasXpress("meter8",
          {
             "x" : {
                "Quarter" : ["Q1","Q1","Q1","Q2","Q2","Q2","Q3","Q3","Q3","Q4","Q4","Q4"]
             },
             "y" : {
                "data" : [
                  [1000,5000,4000,2000,7000,9000,8000,3000,2000,6000,5000,10000]
                ],
                "smps" : ["January","February","March","April","May","June","July","August","September","October","November","December"],
                "vars" : ["Revenue"]
             }
          },
          {
             "graphType" : "Meter",
             "groupingFactors" : ["Quarter"],
             "summaryType" : "sum",
             "meterType" : "digital",
             "meterVar" : "Revenue",
             "xAxis" : ["Revenue"]
          }
        );
      </script>
    </div>

  </body>

</html>
