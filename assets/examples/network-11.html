<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanvasXpress: Network Chart</title>
    <meta name="description" content="CanvasXpress: Enhanced Network Visualization with Hierarchical Grouping iframe">
    <meta name="author" content="CanvasXpress Team">
    <meta name="theme-color" content="#fceecf" />
    
    <meta property="og:title" content="CanvasXpress: Network Chart">
    <meta property="og:description" content="CanvasXpress: Enhanced Network Visualization with Hierarchical Grouping iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    <meta property="og:url" content="https://www.canvasxpress.org/assets/examples/network-11.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="CanvasXpress">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CanvasXpress: Network Chart">
    <meta name="twitter:description" content="CanvasXpress: Enhanced Network Visualization with Hierarchical Grouping iframe">
    <meta name="twitter:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    
    <link rel="canonical" href="https://www.canvasxpress.org/assets/examples/network-11.html">

    <link rel="stylesheet" href="/dist/build.css">
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="network11" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXnetwork11 = new CanvasXpress("network11",
          {
             "edges" : [{"id1" : "Id1","id2" : "Id2","thickness" : 3},{"id1" : "Id2","id2" : "Id3","thickness" : 3},{"id1" : "Id3","id2" : "Id4","thickness" : 3},{"id1" : "Id0","id2" : "Id1","thickness" : 3},{"id1" : "Id2","id2" : "Id0","thickness" : 3},{"id1" : "Id3","id2" : "Id5","thickness" : 3},{"id1" : "Id0","id2" : "Id5","thickness" : 3}],
             "groups" : [{"color" : "rgb(94, 159, 202)","groupIds" : ["G1"],
                   "id" : "G0",
                   "nodes" : ["Id0"],
                   "padding" : 0.01
                },
                {
                   "color" : "rgba(245, 245, 245, 0.5)",
                   "id" : "G1",
                   "nodes" : ["Id1","Id2"],
                   "padding" : 0.01
                },
                {
                   "color" : "rgb(255, 187, 120)",
                   "id" : "G2",
                   "nodes" : ["Id3","Id4"],
                   "padding" : 0.01
                }
             ],
             "nodes" : [{"color" : "rgb(255, 187, 120)","height" : 20,"id" : "Id0","name" : "a","shape" : "roundrect","width" : 30},{"color" : "rgb(255, 187, 120)","height" : 20,"id" : "Id1","name" : "b","shape" : "roundrect","width" : 30},{"color" : "rgb(255, 187, 120)","height" : 20,"id" : "Id2","name" : "c","shape" : "roundrect","width" : 30},{"color" : "rgb(255, 187, 120)","height" : 20,"id" : "Id3","name" : "d","shape" : "roundrect","width" : 30},{"color" : "rgb(255, 187, 120)","height" : 20,"id" : "Id4","name" : "e","shape" : "roundrect","width" : 30},{"color" : "rgb(255, 187, 120)","height" : 20,"id" : "Id5","name" : "f","shape" : "roundrect","width" : 30},{"color" : "rgb(255, 187, 120)","height" : 20,"id" : "Id6","name" : "g","shape" : "roundrect","width" : 30}]
          },
          {
             "edgeColor" : "rgb(122,78,79)",
             "edgeThickness" : 3,
             "graphType" : "Network",
             "networkColaAllConstraintsIterations" : 50,
             "networkColaAvoidOverlaps" : true,
             "networkColaGridSnapIterations" : 50,
             "networkColaLinkDistance" : 80,
             "networkColaStartUnconstrainedIterations" : 100,
             "networkColaUserConstraintIterations" : 0,
             "networkLayoutType" : "cola"
          }
        );
      </script>
    </div>

  </body>

</html>
