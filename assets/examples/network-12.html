<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanvasXpress: Network Chart</title>
    <meta name="description" content="CanvasXpress: Unlock Data Insights with Network Graphs iframe">
    <meta name="author" content="CanvasXpress Team">
    <meta name="theme-color" content="#fceecf" />
    
    <meta property="og:title" content="CanvasXpress: Network Chart">
    <meta property="og:description" content="CanvasXpress: Unlock Data Insights with Network Graphs iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    <meta property="og:url" content="https://www.canvasxpress.org/assets/examples/network-12.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="CanvasXpress">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CanvasXpress: Network Chart">
    <meta name="twitter:description" content="CanvasXpress: Unlock Data Insights with Network Graphs iframe">
    <meta name="twitter:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    
    <link rel="canonical" href="https://www.canvasxpress.org/assets/examples/network-12.html">

    <link rel="stylesheet" href="/dist/build.css">
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="network12" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXnetwork12 = new CanvasXpress("network12",
          {
             "constraints" : [{"axis" : "x","offsets" : [{"nodeId" : "Id1","offset" : "0"},{"nodeId" : "Id2","offset" : "0"},{"nodeId" : "Id3","offset" : "0"}],
                   "type" : "alignment"
                },
                {
                   "axis" : "y",
                   "offsets" : [{"nodeId" : "Id0","offset" : "0"},{"nodeId" : "Id1","offset" : "0"},{"nodeId" : "Id4","offset" : "0"}],
                   "type" : "alignment"
                }
             ],
             "edges" : [{"id1" : "Id1","id2" : "Id2","thickness" : 3},{"id1" : "Id2","id2" : "Id0","thickness" : 3},{"id1" : "Id2","id2" : "Id3","thickness" : 3},{"id1" : "Id2","id2" : "Id4","thickness" : 3}],
             "nodes" : [{"height" : 20,"id" : "Id0","name" : "a","shape" : "roundrect","width" : 30},{"height" : 20,"id" : "Id1","name" : "b","shape" : "roundrect","width" : 30},{"height" : 20,"id" : "Id2","name" : "c","shape" : "roundrect","width" : 30},{"height" : 20,"id" : "Id3","name" : "d","shape" : "roundrect","width" : 30},{"height" : 20,"id" : "Id4","name" : "e","shape" : "roundrect","width" : 30}]
          },
          {
             "edgeColor" : "rgb(122,78,79)",
             "edgeThickness" : 3,
             "graphType" : "Network",
             "networkColaAllConstraintsIterations" : 10,
             "networkColaAvoidOverlaps" : true,
             "networkColaHandleDisconnected" : true,
             "networkColaLinkDistance" : 80,
             "networkColaStartUnconstrainedIterations" : 10,
             "networkColaUserConstraintIterations" : 10,
             "networkLayoutType" : "cola"
          }
        );
      </script>
    </div>

  </body>

</html>
