<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanvasXpress: Network Chart</title>
    <meta name="description" content="CanvasXpress: Enhanced KEGG Network Visualization iframe">
    <meta name="author" content="CanvasXpress Team">
    <meta name="theme-color" content="#fceecf" />
    
    <meta property="og:title" content="CanvasXpress: Network Chart">
    <meta property="og:description" content="CanvasXpress: Enhanced KEGG Network Visualization iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    <meta property="og:url" content="https://www.canvasxpress.org/assets/examples/network-20.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="CanvasXpress">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CanvasXpress: Network Chart">
    <meta name="twitter:description" content="CanvasXpress: Enhanced KEGG Network Visualization iframe">
    <meta name="twitter:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    
    <link rel="canonical" href="https://www.canvasxpress.org/assets/examples/network-20.html">

    <link rel="stylesheet" href="/dist/build.css">
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="network20" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXnetwork20 = new CanvasXpress("network20",
          "https://www.canvasxpress.org/data/xml/hsa05222.xml",
          {
             "appendNetworkData": [
                "https://www.canvasxpress.org/data/txt/hsa05222.txt",
                {
                   "data": {
                      "2": {
                         "Exp5": -3,
                         "Exp6": 4,
                         "Exp7": "H",
                         "Exp8": {
                            "CL1": 2,
                            "CL2": 14,
                            "CL3": 7
                         },
                         "Exp9": {
                            "CL1": 32,
                            "CL2": 1,
                            "CL3": 5
                         }
                      },
                      "3": {
                         "Exp5": -1,
                         "Exp6": 15,
                         "Exp7": "L",
                         "Exp8": {
                            "CL1": 2,
                            "CL2": 40,
                            "CL3": 22
                         },
                         "Exp9": {
                            "CL1": 45,
                            "CL2": 4
                         }
                      },
                      "4": {
                         "Exp5": 5,
                         "Exp6": 40,
                         "Exp7": "H",
                         "Exp8": {
                            "CL1": 32,
                            "CL2": 4,
                            "CL3": 15
                         },
                         "Exp9": {
                            "CL1": 52,
                            "CL2": 4
                         }
                      },
                      "8": {
                         "Exp5": 10,
                         "Exp6": 24,
                         "Exp7": "H",
                         "Exp8": {
                            "CL1": 12,
                            "CL2": 4,
                            "CL3": 1
                         },
                         "Exp9": {
                            "CL1": 21,
                            "CL2": 44,
                            "CL3": 9
                         }
                      },
                      "9": {
                         "Exp5": -8,
                         "Exp6": 14,
                         "Exp7": "M",
                         "Exp8": {
                            "CL1": 2,
                            "CL2": 14,
                            "CL3": 32
                         },
                         "Exp9": {
                            "CL1": 12,
                            "CL2": 4
                         }
                      }
                   },
                   "type": "node"
                }
             ],
             "decorations": [
                "Exp2",
                "Exp3"
             ],
             "decorationsHeight": 18,
             "decorationsPosition": "right",
             "decorationsType": "pie",
             "graphType": "Network"
          }
        );
      </script>
    </div>

  </body>

</html>
