  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="nonlinearfit2" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXnonlinearfit2 = new CanvasXpress("nonlinearfit2",
          {
             "y" : {
                "data" : [
                  [0,2],
                  [1,4],
                  [2,7],
                  [3,7],
                  [4,19],
                  [5,20],
                  [6,43],
                  [7,51],
                  [8,74],
                  [9,81],
                  [10,75],
                  [11,117],
                  [12,100],
                  [13,84],
                  [14,90],
                  [15,54],
                  [16,43],
                  [17,47],
                  [18,34],
                  [19,24],
                  [20,11],
                  [21,7],
                  [22,4],
                  [23,2]
                ],
                "smps" : ["X","Y"],
                "vars" : ["S1","S2","S3","S4","S5","S6","S7","S8","S9","S10","S11","S12","S13","S14","S15","S16","S17","S18","S19","S20","S21","S22","S23","S24"]
             }
          },
          {
            "graphType": "Scatter2D",
            "showDecorations": true,
            "showLegend": false,
            "xAxis": ["X"],
            "yAxis": ["Y"]
          },
          false,
          false,
          [
            [
              "addNormalDistributionLine",
              []
            ]
          ]
        );
      </script>
    </div>

  </body>
