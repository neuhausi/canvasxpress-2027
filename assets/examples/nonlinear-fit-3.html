<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanvasXpress: NonLinear-Fit Chart</title>
    <meta name="description" content="CanvasXpress: Unlock Data Insights with Logarithmic Fit iframe">
    <meta name="author" content="CanvasXpress Team">
    <meta name="theme-color" content="#fceecf" />
    
    <meta property="og:title" content="CanvasXpress: NonLinear-Fit Chart">
    <meta property="og:description" content="CanvasXpress: Unlock Data Insights with Logarithmic Fit iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    <meta property="og:url" content="https://www.canvasxpress.org/assets/examples/nonlinear-fit-3.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="CanvasXpress">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CanvasXpress: NonLinear-Fit Chart">
    <meta name="twitter:description" content="CanvasXpress: Unlock Data Insights with Logarithmic Fit iframe">
    <meta name="twitter:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    
    <link rel="canonical" href="https://www.canvasxpress.org/assets/examples/nonlinear-fit-3.html">

    <link rel="stylesheet" href="/dist/build.css">
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="nonlinearfit3" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXnonlinearfit3 = new CanvasXpress("nonlinearfit3",
          {
             "y" : {
                "data" : [
                  [1,6],
                  [2,9.5],
                  [3,13],
                  [4,15],
                  [5,16.5],
                  [6,17.5],
                  [7,18.5],
                  [8,19],
                  [9,19.5],
                  [10,19.7],
                  [11,19.8]
                ],
                "smps" : ["Age","Height"],
                "vars" : ["S1","S2","S3","S4","S5","S6","S7","S8","S9","S10","S11"]
             }
          },
          {
            "decorations": {
              "logarithmic": [
                {
                  "color": "red"
                }
              ]
            },
            "graphType": "Scatter2D",
            "showDecorations": true,
            "showLegend": false,
            "xAxis": ["Age"],
            "yAxis": ["Height"]
          }
        );
      </script>
    </div>

  </body>

</html>
