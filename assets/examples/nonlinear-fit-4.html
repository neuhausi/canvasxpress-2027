<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="description" content="CanvasXpress: Exponential Relationships Analysis for Industries iframe">

    <meta name="twitter:card" content="summary_large_image">

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="nonlinearfit4" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXnonlinearfit4 = new CanvasXpress("nonlinearfit4",
          {
             "y" : {
                "data" : [
                  [0,179.5],
                  [5,168.7],
                  [8,158.1],
                  [11,149.2],
                  [15,141.7],
                  [18,134.6],
                  [22,125.4],
                  [25,123.5],
                  [30,116.3],
                  [34,113.2],
                  [38,109.1],
                  [42,105.7],
                  [45,102.2],
                  [50,100.5]
                ],
                "smps" : ["Time","Temp"],
                "vars" : ["S1","S2","S3","S4","S5","S6","S7","S8","S9","S10","S11","S12","S13","S14"]
             }
          },
          {
            "decorations": {
              "exponential": [
                {
                  "color": "red"
                }
              ]
            },
            "graphType": "Scatter2D",
            "showDecorations": true,
            "showLegend": false,
            "xAxis": ["Time"],
            "yAxis": ["Temp"]
          }
        );
      </script>
    </div>

  </body>

</html>
