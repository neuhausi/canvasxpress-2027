<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="twitter:card" content="summary_large_image">

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="nonlinearfit5" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXnonlinearfit5 = new CanvasXpress("nonlinearfit5",
          {
             "y" : {
                "data" : [
                  [17.6,159.9],
                  [26,206.9],
                  [31.9,236.8],
                  [38.9,269.9],
                  [45.8,300.6],
                  [51.2,323.6],
                  [58.1,351.7],
                  [64.7,377.6],
                  [66.7,384.1],
                  [80.8,437.2],
                  [82.9,444.7]
                ],
                "smps" : ["Diameter","Length"],
                "vars" : ["S1","S2","S3","S4","S5","S6","S7","S8","S9","S10","S11"]
             }
          },
          {
            "decorations": {
              "power": [
                {
                  "color": "red"
                }
              ]
            },
            "graphType": "Scatter2D",
            "showDecorations": true,
            "showLegend": false,
            "xAxis": ["Diameter"],
            "yAxis": ["Length"]
          }
        );
      </script>
    </div>

  </body>

</html>
