</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="nonlinearfit6" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXnonlinearfit6 = new CanvasXpress("nonlinearfit6",
          {
             "y" : {
                "data" : [
                  [-1,-1],
                  [0,3],
                  [1,2.5],
                  [2,5],
                  [3,4],
                  [5,2],
                  [7,5],
                  [9,4]
                ],
                "smps" : ["X","Y"],
                "vars" : ["S1","S2","S3","S4","S5","S6","S7","S8"]
             }
          },
          {
             "decorations" : {
                "polynomial" : [{"color" : "red"}]
             },
             "graphType" : "Scatter2D",
             "showDecorations" : true,
             "showLegend" : false,
             "xAxis" : ["X"],
             "yAxis" : ["Y"]
          }
        );
      </script>
    </div>

  </body>

</html>
