</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="oncoprint3" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXoncoprint3 = new CanvasXpress("oncoprint3",
          {
             "x" : {
                "Annt1" : ["Desc : 1","Desc : 2","Desc : 1"],
                "Annt2" : [23,34,52],
                "Annt3" : [12,14,34],
                "Annt4" : [8,14,14],
                "Annt5" : [17,9,18]
             },
             "y" : {
                "data" : [
                  [3.1,3.5,4],
                  [3,7.4,4.1],
                  [2.8,3.1,3.3],
                  [2.3,2.4,2.1],
                  [4.9,6.1,6.1],
                  [1.9,2.1,0.1],
                  [2.2,1.9,2.1],
                  [1.7,2.1,0.2],
                  [0.2,4.9,3.9]
                ],
                "data2" : [["","","Amplification"],
                  ["","Amplification",""],
                  ["","",""],
                  ["","",""],
                  ["","Amplification","Amplification"],
                  ["","",""],
                  ["","",""],
                  ["","","Deletion"],
                  ["Deletion","Amplification",""]
                ],
                "data3" : [["","","Missence"],
                  ["","","Truncating"],
                  ["Nonsense","",""],
                  ["","Missence",""],
                  ["","Truncating",""],
                  ["","Nonsense",""],
                  ["","",""],
                  ["Missence","",""],
                  ["","",""]
                ],
                "data4" : [["","A",""],
                  ["","A",""],
                  ["","A",""],
                  ["","A",""],
                  ["","B",""],
                  ["","B",""],
                  ["","","B"],
                  ["","","B"],
                  ["B","",""]
                ],
                "smps" : ["V1","V2","V3"],
                "vars" : ["S1","S2","S3","S4","S5","S6","S7","S8","S9"]
             },
             "z" : {
                "Factor" : ["Lev : 1","Lev : 2","Lev : 1","Lev : 2","Lev : 1","Lev : 2","Lev : 1","Lev : 2","Lev : 1"]
             }
          },
          {
             "graphType" : "Heatmap",
             "oncoprintCNA" : "data2",
             "oncoprintMUT" : "data3",
             "overlaysThickness" : 100,
             "patternBy" : "Pattern",
             "patternByData" : "data4",
             "smpOverlayProperties" : {
                "Annt2" : {
                   "position" : "right",
                   "type" : "Bar"
                },
                "Annt3" : {
                   "type" : "Stacked"
                },
                "Annt4" : {
                   "type" : "Stacked"
                },
                "Annt5" : {
                   "type" : "Stacked"
                }
             },
             "smpOverlays" : ["Annt1","-","Annt2","Annt3","Annt4","Annt5"],
             "xAxis" : ["S1","S2","S3","S4","S5","S6","S7","S8","S9"]
          }
        );
      </script>
    </div>

  </body>

</html>
