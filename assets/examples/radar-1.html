<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanvasXpress: Radar Chart</title>
    <meta name="description" content="CanvasXpress: Visualize Data with Radar Charts iframe">
    <meta name="author" content="CanvasXpress Team">
    <meta name="theme-color" content="#fceecf" />
    
    <meta property="og:title" content="CanvasXpress: Radar Chart">
    <meta property="og:description" content="CanvasXpress: Visualize Data with Radar Charts iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    <meta property="og:url" content="https://www.canvasxpress.org/assets/examples/radar-1.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="CanvasXpress">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CanvasXpress: Radar Chart">
    <meta name="twitter:description" content="CanvasXpress: Visualize Data with Radar Charts iframe">
    <meta name="twitter:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    
    <link rel="canonical" href="https://www.canvasxpress.org/assets/examples/radar-1.html">

    <link rel="stylesheet" href="/dist/build.css">
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="radar1" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXradar1 = new CanvasXpress("radar1",
          {
             "x" : {
                "Factor1" : ["Lev : 1","Lev : 2","Lev : 3","Lev : 1","Lev : 2","Lev : 3"],
                "Factor2" : ["Lev : A","Lev : B","Lev : A","Lev : B","Lev : A","Lev : B"],
                "Factor3" : ["Lev : X","Lev : X","Lev : Y","Lev : Y","Lev : Z","Lev : Z"],
                "Factor4" : [5,10,15,20,25,30],
                "Factor5" : [8,16,24,32,40,48],
                "Factor6" : [10,20,30,40,50,60]
             },
             "y" : {
                "data" : [
                  [5,10,25,40,45,50],
                  [95,80,75,70,55,40],
                  [25,30,45,60,65,70],
                  [55,40,35,30,15,1]
                ],
                "desc" : ["Magnitude1","Magnitude2"],
                "smps" : ["S1","S2","S3","S4","S5","S6"],
                "vars" : ["V1","V2","V3","V4"]
             },
             "z" : {
                "Annt1" : ["Desc : 1","Desc : 2","Desc : 3","Desc : 4"],
                "Annt2" : ["Desc : A","Desc : B","Desc : A","Desc : B"],
                "Annt3" : ["Desc : X","Desc : X","Desc : Y","Desc : Y"],
                "Annt4" : [5,10,15,20],
                "Annt5" : [8,16,24,32],
                "Annt6" : [10,20,30,40]
             }
          },
          {
             "circularArc" : 360,
             "circularRotate" : 0,
             "circularType" : "radar",
             "colorScheme" : "Bootstrap",
             "graphType" : "Circular",
             "legendKeyBackgroundBorderColor" : "rgba(255,255,255,0)",
             "legendKeyBackgroundColor" : "rgba(255,255,255,0)",
             "ringGraphType" : ["line"],
             "showTransition" : false,
             "title" : "Radar - Line",
             "transitionStep" : 50,
             "transitionTime" : 1500,
             "xAxis" : ["V1", "V2", "V3", "V4"]
          }
        );
      </script>
    </div>

  </body>

</html>
