  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="radar9" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXradar9 = new CanvasXpress("radar9",
          {
            "x": {
              "size": [93,55,57,23,66,23,53,60,41,92,34,94,93,1,61,60,89,75,57,94,63,13,19,87,57,2,57,12,38,20],
              "color": ["red","red","red","red","red","red","blue","blue","blue","blue","blue","blue","blue","blue","blue","brown","brown","brown","brown","brown","brown","green","green","green","green","green","green","green","green","green"],
              "alpha": [0.44,0.5,0.41,0.21,0.22,0.23,0.73,0.42,0.58,0.49,0.43,0.73,0.56,0.3,0.97,0.22,0.14,0.61,0.49,0.18,0.11,0.54,0.29,0.1,0.49,0.63,0.04,0.5,0.08,0.79]
            },
            "y": {
              "data": [
                [2,1,5,3,5,1,3,1,4,5,3,2,2,4,2,5,1,4,5,1,4,3,5,3,4,2,2,4,3,1],
                [0.25,1.07,1.17,1.18,1.53,2.18,2.74,2.91,2.93,3,3.12,3.27,3.84,4.01,4.07,4.08,4.32,4.42,4.76,5.05,5.18,5.41,5.47,5.49,5.69,5.81,5.91,5.94,6.1,6.18]
              ],
              "smps": ["smp1","smp2","smp3","smp4","smp5","smp6","smp7","smp8","smp9","smp10","smp11","smp12","smp13","smp14","smp15","smp16","smp17","smp18","smp19","smp20","smp21","smp22","smp23","smp24","smp25","smp26","smp27","smp28","smp29","smp30"],
              "vars": ["radius","radians"]
            }
          },
          {
            "graphType": "Circular",
            "circularTrackGraphType": [ "scatter" ],
            "circularType": "radar",
            "colorBy": "color",
            "colorKey": {
              "color": {
                "red": "#FF0000",
                "blue": "#0000FF",
                "green": "#00FF00",
                "brown": "#A52A2A"
              }
            },
            "sizeBy": "size",
            "rAxis": "radians",
            "yAxis": [ "radius" ],
            "setMinY": 0,
            "setMaxY": 5,
            "setMinR": 0,
            "setMaxR": 6.283185307179586,
            "showSampleNames": false,
            "showLegend": true,
            "rAxisShow": true,
            "rAxisPercentShow": false
          }
        );
      </script>
    </div>
