    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />

</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="remotegraphs7" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        CanvasXpress.json("https://www.canvasxpress.org/data/json/dsmall.json", function(err, json) {
          if (err) {
            alert(err);
            return;
          } else {
            var data = {
              y: {
                smps: ['carat', 'depth', 'table', 'price', 'x', 'y', 'z'],
                vars: [],
                data: []
              },
              z: {
                'cut': [],
                'color': [],
                'clarity': []
              }
            }
            var config = {
              graphType: "Scatter2D",
              colorBy: "cut",
              xAxis: ['carat'],
              yAxis: ['price']
            }
            json.shift();
            for (var i = 0; i < json.length; i++) {
              data.y.vars.push('Id' + json[i][0]);
              data.y.data.push([json[i][1], json[i][5], json[i][6], json[i][7], json[i][8], json[i][9], json[i][10]]);
              data.z.cut.push(json[i][2]);
              data.z.color.push(json[i][3]);
              data.z.clarity.push(json[i][4]);
            }
            new CanvasXpress("remotegraphs7", data, config);
          }
        });
      </script>
    </div>

  </body>

</html>
