</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="remotegraphs8" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        CanvasXpress.csv("https://www.canvasxpress.org/data/csv/chickwts.csv", function(err, csv) {
          if (err) {
            alert(err);
            return;
          } else {
            var arr = csv.split("\n").map(function (line) {
              return line.split(",");
            });
            var data = {
              y: {
                smps: [],
                vars: ['weight'],
                data: [[]]
              },
              x: {
                'feed': []
              }
            }
            var config = {
              graphType: "Boxplot",
              groupingFactors: ["feed"],
              graphOrientation: "vertical",
              smpLabelRotate: 90
            }
            arr.shift();
            arr.pop();
            for (var i = 0; i < arr.length; i++) {
              data.y.smps.push('Id' + arr[i][0].replace(/"/g, ''));
              data.y.data[0].push(Number(arr[i][1]));
              data.x.feed.push(arr[i][2].replace(/"/g, ''));
            }
            var c = new CanvasXpress("remotegraphs8", data, config);
          }
        });
      </script>
    </div>

  </body>

</html>
