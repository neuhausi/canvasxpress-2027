<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanvasXpress: Scatter2D Chart</title>
    <meta name="description" content="CanvasXpress: Visualize Data with Scatter2D Graphs iframe">
    <meta name="author" content="CanvasXpress Team">
    <meta name="theme-color" content="#fceecf" />
    
    <meta property="og:title" content="CanvasXpress: Scatter2D Chart">
    <meta property="og:description" content="CanvasXpress: Visualize Data with Scatter2D Graphs iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    <meta property="og:url" content="https://www.canvasxpress.org/assets/examples/scatter2d-1.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="CanvasXpress">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CanvasXpress: Scatter2D Chart">
    <meta name="twitter:description" content="CanvasXpress: Visualize Data with Scatter2D Graphs iframe">
    <meta name="twitter:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    
    <link rel="canonical" href="https://www.canvasxpress.org/assets/examples/scatter2d-1.html">

    <link rel="stylesheet" href="/dist/build.css">
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="scatter2d1" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXscatter2d1 = new CanvasXpress("scatter2d1",
          {
             "y" : {
                "data" : [
                  [6.47,4.03],
                  [6.13,3.76],
                  [6.19,3.77],
                  [4.89,3.34],
                  [5.63,3.47],
                  [4.52,2.92],
                  [5.89,3.2],
                  [4.79,2.71],
                  [3.53,3.53],
                  [6.08,4.51],
                  [4.02,4.56]
                ],
                "smps" : ["Alcohol","Tobacco"],
                "vars" : ["North","Yorkshire","Northeast","East Midlands","West Midlands","East Anglia","Southeast","Southwest","Wales","Scotland","Northern Ireland"]
             }
          },
          {
            "citation": "Moore, David S., and George P. McCabe (1989). Introduction to the Practice of Statistics, p. 179.",
            "decorations": {
              "marker": [
                {
                  "sample": ["Alcohol", "Tobacco"],
                  "text": "Maybe an Outlier?",
                  "variable": "Northern Ireland",
                  "x": 0.45,
                  "y": 0.18
                }
              ]
            },
            "graphType": "Scatter2D",
            "showTransition": false,
            "title": "Average weekly household spending, in British pounds, on tobacco products\\nand alcoholic beverages for each of the 11 regions of Great Britain.",
            "xAxis": ["Alcohol"],
            "yAxis": ["Tobacco"]
          }
        );
      </script>
    </div>

  </body>

</html>
