<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanvasXpress: Scatter2D Chart</title>
    <meta name="description" content="CanvasXpress: Non-linear Scatter Plot with Line Decoration iframe">
    <meta name="author" content="CanvasXpress Team">
    <meta name="theme-color" content="#fceecf" />
    
    <meta property="og:title" content="CanvasXpress: Scatter2D Chart">
    <meta property="og:description" content="CanvasXpress: Non-linear Scatter Plot with Line Decoration iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    <meta property="og:url" content="https://www.canvasxpress.org/assets/examples/scatter2d-10.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="CanvasXpress">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CanvasXpress: Scatter2D Chart">
    <meta name="twitter:description" content="CanvasXpress: Non-linear Scatter Plot with Line Decoration iframe">
    <meta name="twitter:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    
    <link rel="canonical" href="https://www.canvasxpress.org/assets/examples/scatter2d-10.html">

    <link rel="stylesheet" href="/dist/build.css">
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="scatter2d10" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXscatter2d10 = new CanvasXpress("scatter2d10",
          {
             "y" : {
                "data" : [
                  [0.0009,172],
                  [0.0018,177],
                  [0.0037,160],
                  [0.0073,166],
                  [0.0146,211],
                  [0.0293,248],
                  [0.0586,269],
                  [0.117,283],
                  [0.234,298],
                  [0.469,314],
                  [0.938,328],
                  [1.88,316]
                ],
                "smps" : ["Concentration","V1"],
                "vars" : ["S1","S2","S3","S4","S5","S6","S7","S8","S9","S10","S11","S12"]
             }
          },
          {
            "decorations": {
              "nlfit": [
                {
                  "label": "Custom Fit",
                  "param": [164, 313, 0.031, -1.5, 1.2e-06, 1.9],
                  "type": "cst"
                },
                {
                  "label": "Regular Fit",
                  "param": [164, 313, 0.031, 1.5, 1.2e-06, 1.9],
                  "type": "reg"
                }
              ]
            },
            "graphType": "Scatter2D",
            "setMaxY": 350,
            "setMinY": 100,
            "showDecorations": true,
            "xAxis": ["Concentration"],
            "xAxisTransform": "log10",
            "xAxisTransformTicks": true,
            "yAxis": ["V1"],
            "yAxisExact": true
          }
        );
      </script>
    </div>

  </body>

</html>
