<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanvasXpress: Scatter2D Chart</title>
    <meta name="description" content="CanvasXpress: Visualize Data with Spider Plots iframe">
    <meta name="author" content="CanvasXpress Team">
    <meta name="theme-color" content="#fceecf" />
    
    <meta property="og:title" content="CanvasXpress: Scatter2D Chart">
    <meta property="og:description" content="CanvasXpress: Visualize Data with Spider Plots iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    <meta property="og:url" content="https://www.canvasxpress.org/assets/examples/scatter2d-2.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="CanvasXpress">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CanvasXpress: Scatter2D Chart">
    <meta name="twitter:description" content="CanvasXpress: Visualize Data with Spider Plots iframe">
    <meta name="twitter:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    
    <link rel="canonical" href="https://www.canvasxpress.org/assets/examples/scatter2d-2.html">

    <link rel="stylesheet" href="/dist/build.css">
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="scatter2d2" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXscatter2d2 = new CanvasXpress("scatter2d2",
          {
             "y" : {
                "data" : [
                  [0,0],
                  [8,-0.6],
                  [16,-0.7],
                  [24,-0.7],
                  [32,-0.7],
                  [40,-0.7],
                  [48,-0.65],
                  [56,-0.7],
                  [0,0],
                  [8,0.5],
                  [16,0.7],
                  [0,0],
                  [8,0.3],
                  [16,0.4],
                  [24,0.6],
                  [0,0],
                  [8,-0.1],
                  [16,-0.3],
                  [24,-0.2],
                  [32,-0.4],
                  [40,-0.5],
                  [0,0],
                  [8,-0.4],
                  [16,-0.5],
                  [24,-0.55],
                  [32,-0.55],
                  [40,-0.4],
                  [48,-0.7],
                  [58,-0.8]
                ],
                "smps" : ["Weeks","Change From Baseline %"]
             },
             "z" : {
                "Response" : ["Complete Response","Complete Response","Complete Response","Complete Response","Complete Response","Complete Response","Complete Response","Complete Response","Progressive Disease","Progressive Disease","Progressive Disease","Progressive Disease","Progressive Disease","Progressive Disease","Progressive Disease","Partial Response","Partial Response","Partial Response","Partial Response","Partial Response","Partial Response","Partial Response","Partial Response","Partial Response","Partial Response","Partial Response","Partial Response","Partial Response","Partial Response"],
                "Subject" : ["S101810","S101810","S101810","S101810","S101810","S101810","S101810","S101810","S103101","S103101","S103101","S103105","S103105","S103105","S103105","S103201","S103201","S103201","S103201","S103201","S103201","S103205","S103205","S103205","S103205","S103205","S103205","S103205","S103205"]
             }
          },
          {
            "colorBy": "Response",
            "graphType": "Scatter2D",
            "legendBox": true,
            "legendInside": true,
            "legendPosition": "topRight",
            "lineBy": "Subject",
            "title": "Tumor Response by Week",
            "xAxis": ["Weeks"],
            "yAxis": ["Change From Baseline %"]
          }
        );
      </script>
    </div>

  </body>

</html>
