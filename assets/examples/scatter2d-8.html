<head>

</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="scatter2d8" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXscatter2d8 = new CanvasXpress("scatter2d8",
          {
             "y" : {
                "data" : [
                  [18,76.1],
                  [19,77],
                  [20,78.1],
                  [21,78.2],
                  [22,78.8],
                  [23,79.7],
                  [24,79.9],
                  [25,81.1],
                  [26,81.2],
                  [27,81.8],
                  [28,82.8],
                  [29,83.5]
                ],
                "smps" : ["Age","Height"],
                "vars" : ["s1","s2","s3","s4","s5","s6","s7","s8","s9","s10","s11","s12"]
             }
          },
          {
            "citation": "Moore, David S., and George P. McCabe (1989)",
            "citationScaleFontFactor": 0.75,
            "graphType": "Scatter2D",
            "showRegressionFit": true,
            "title": "Mean heights of a group of children in Kalama",
            "xAxis": ["Age"],
            "yAxis": ["Height"]
          }
        );
      </script>
    </div>

  </body>

</html>
