<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="description" content="CanvasXpress: Revamp Regression Plot for Improved Data Analysis iframe">
    <meta name="author" content="CanvasXpress Team">
    <meta name="theme-color" content="#fceecf" />
    
    <meta property="og:title" content="CanvasXpress: Scatter2D Chart">
    <meta property="og:description" content="CanvasXpress: Revamp Regression Plot for Improved Data Analysis iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    <meta property="og:url" content="https://www.canvasxpress.org/assets/examples/scatter2d-9.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="CanvasXpress">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CanvasXpress: Scatter2D Chart">

    <link rel="stylesheet" href="/dist/build.css">
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="scatter2d9" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXscatter2d9 = new CanvasXpress("scatter2d9",
          {
             "y" : {
                "data" : [
                  [102.5,51.3],
                  [104.5,49.9],
                  [100.4,50],
                  [95.9,49.2],
                  [87,48.5],
                  [95,47.8],
                  [88.6,47.3],
                  [89.2,45.1],
                  [78.9,46.3],
                  [84.6,42.1],
                  [81.7,44.2],
                  [72.2,43.5],
                  [65.1,42.3],
                  [68.1,40.2],
                  [67.3,31.8],
                  [52.5,34]
                ],
                "smps" : ["Mortality","Temperature"],
                "vars" : ["s1","s2","s3","s4","s5","s6","s7","s8","s9","s10","s11","s12","s13","s14","s15","s16"]
             }
          },
          {
            "backgroundType": "panel",
            "citation": "Velleman, P. F. and Hoaglin, D. C. (1981).\\nApplications, Basics, and Computing of Exploratory Data Analysis. Belmont. CA :  Wadsworth, Inc., pp. 127-134.",
            "colors": ["rgba(64,64,64,0.5)"],
            "decorationsBackgroundColor": "rgb(238,238,238)",
            "decorationsBorderColor": "rgb(0,0,0)",
            "decorationsPosition": "bottomRight",
            "graphType": "Scatter2D",
            "legendBackgroundColor": "rgba(255,255,255,0)",
            "legendInside": true,
            "panelBackgroundColor": "rgb(238,238,238)",
            "showDecorations": true,
            "showRegressionFit": true,
            "showTransition": false,
            "title": "Mean annual temperature (in degrees F) and Mortality Index for neoplasms of the female breast.",
            "xAxis": ["Mortality"],
            "xAxisGridMajorColor": "rgb(255,255,255)",
            "yAxis": ["Temperature"],
            "yAxisGridMajorColor": "rgb(255,255,255)"
          }
        );
      </script>
    </div>

  </body>

</html>
