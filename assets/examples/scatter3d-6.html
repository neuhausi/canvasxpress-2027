<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanvasXpress: Scatter3D Chart</title>
    <meta name="description" content="CanvasXpress: 3D Scatter Plot Analysis iframe">
    <meta name="author" content="CanvasXpress Team">
    <meta name="theme-color" content="#fceecf" />
    
    <meta property="og:title" content="CanvasXpress: Scatter3D Chart">
    <meta property="og:description" content="CanvasXpress: 3D Scatter Plot Analysis iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    <meta property="og:url" content="https://www.canvasxpress.org/assets/examples/scatter3d-6.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="CanvasXpress">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CanvasXpress: Scatter3D Chart">
    <meta name="twitter:description" content="CanvasXpress: 3D Scatter Plot Analysis iframe">
    <meta name="twitter:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    
    <link rel="canonical" href="https://www.canvasxpress.org/assets/examples/scatter3d-6.html">

    <link rel="stylesheet" href="/dist/build.css">
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="scatter3d6" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXscatter3d6 = new CanvasXpress("scatter3d6",
          {
             "x" : {
                "Factor1" : ["Lev : 1","Lev : 2","Lev : 3","Lev : 1","Lev : 2","Lev : 3"],
                "Factor2" : ["Lev : A","Lev : B","Lev : A","Lev : B","Lev : A","Lev : B"],
                "Factor3" : ["Lev : X","Lev : X","Lev : Y","Lev : Y","Lev : Z","Lev : Z"]
             },
             "y" : {
                "data" : [
                  [5,10,25,40,45,50],
                  [95,80,75,70,55,40],
                  [25,30,45,60,65,70],
                  [55,40,35,30,15,1],
                  [10,20,35,50,55,65],
                  [80,70,65,60,45,35],
                  [30,40,55,70,75,85],
                  [60,50,45,40,25,15]
                ],
                "desc" : ["Magnitude1","Magnitude2"],
                "smps" : ["S1","S2","S3","S4","S5","S6"],
                "vars" : ["V1","V2","V3","V4","V5","V6","V7","V8"]
             },
             "z" : {
                "Annt1" : ["Desc : 1","Desc : 2","Desc : 3","Desc : 4","Desc : 5","Desc : 6","Desc : 7","Desc : 8"],
                "Annt2" : ["Desc : A","Desc : B","Desc : A","Desc : B","Desc : A","Desc : B","Desc : A","Desc : B"],
                "Annt3" : ["Desc : X","Desc : X","Desc : Y","Desc : Y","Desc : X","Desc : X","Desc : Y","Desc : Y"]
             }
          },
          {
            "colorBy": "Annt1",
            "graphType": "Scatter3D",
            "legendKeyBackgroundBorderColor": "rgba(255,255,255,0)",
            "legendKeyBackgroundColor": "rgba(255,255,255,0)",
            "shapeBy": "Annt2",
            "sizeBy": "Annt3",
            "xAxis": ["S1"],
            "yAxis": ["S2"],
            "zAxis": ["S3"]
          }
        );
      </script>
    </div>

  </body>

</html>
