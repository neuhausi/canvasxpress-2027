</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="scatter3d7" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXscatter3d7 = new CanvasXpress("scatter3d7",
          {
             "fx" : "sin(2y) * cos(3x) / sec(xy)"
          },
          {
             "colorBy" : "Y",
             "graphType" : "Scatter3D",
             "outline3DColor" : "rgba(0,0,0,0.1)"
          }
        );
      </script>
    </div>

  </body>

</html>
