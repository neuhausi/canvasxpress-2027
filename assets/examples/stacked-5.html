<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanvasXpress: Stacked Chart</title>
    <meta name="description" content="CanvasXpress: Likert Plot: Diverging Bar Graphs iframe">
    <meta name="author" content="CanvasXpress Team">
    <meta name="theme-color" content="#fceecf" />
    
    <meta property="og:title" content="CanvasXpress: Stacked Chart">
    <meta property="og:description" content="CanvasXpress: Likert Plot: Diverging Bar Graphs iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    <meta property="og:url" content="https://www.canvasxpress.org/assets/examples/stacked-5.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="CanvasXpress">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CanvasXpress: Stacked Chart">
    <meta name="twitter:description" content="CanvasXpress: Likert Plot: Diverging Bar Graphs iframe">
    <meta name="twitter:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    
    <link rel="canonical" href="https://www.canvasxpress.org/assets/examples/stacked-5.html">

    <link rel="stylesheet" href="/dist/build.css">
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="stacked5" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXstacked5 = new CanvasXpress("stacked5",
          {
             "y" : {
                "data" : [
                  [-35,-20,-5],
                  [-25,-20,-10],
                  [-15,-10,-10],
                  [10,10,15],
                  [10,20,25],
                  [5,20,35]
                ],
                "smps" : ["Big Fat Liar","Two-Faced","Honest Abe"],
                "vars" : ["Pants on Fire","False","Mostly False","Half True","Mostly True","True"]
             }
          },
          {
             "axisAlgorithm" : "wilkinson",
             "colorScheme" : "CanvasXpress",
             "graphOrientation" : "horizontal",
             "graphType" : "Stacked",
             "legendColumns" : 3,
             "legendKeyBackgroundBorderColor" : "rgba(255,255,255,0)",
             "legendKeyBackgroundColor" : "rgba(255,255,255,0)",
             "legendPosition" : "bottom",
             "marginRight" : 20,
             "showDataValues" : true,
             "title" : "Diverging Stacked Graph",
             "xAxisTickFormat" : "%s%%",
             "xAxis" : ["Pants on Fire","False","Mostly False","Half True","Mostly True","True"]
          }
        );
      </script>
    </div>

  </body>

</html>
