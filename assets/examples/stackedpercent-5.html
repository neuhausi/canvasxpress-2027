<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="CanvasXpress: Gender Disparity: Lack of Female Role Models iframe">
    <meta name="author" content="CanvasXpress Team">
    <meta name="theme-color" content="#fceecf" />
    
    <meta property="og:title" content="CanvasXpress: StackedPercent Chart">
    <meta property="og:description" content="CanvasXpress: Gender Disparity: Lack of Female Role Models iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    <meta property="og:url" content="https://www.canvasxpress.org/assets/examples/stackedpercent-5.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="CanvasXpress">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CanvasXpress: StackedPercent Chart">
    <meta name="twitter:description" content="CanvasXpress: Gender Disparity: Lack of Female Role Models iframe">
    <meta name="twitter:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    
    <link rel="canonical" href="https://www.canvasxpress.org/assets/examples/stackedpercent-5.html">

    <link rel="stylesheet" href="/dist/build.css">
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="stackedpercent5" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXstackedpercent5 = new CanvasXpress("stackedpercent5",
          {
             "x" : {
                "Color" : ["A","B","C","D","E","F"]
             },
             "y" : {
                "data" : [
                  [35,33,34,18,14,50],
                  [22,24,23,39,43,7],
                  [56,43,25,34,12,47],
                  [4,17,35,26,48,13]
                ],
                "smps" : ["Top 2 Roles","Self Reliant","Human","Adult with Job","Child","No Magic"],
                "vars" : ["Females-in","Females-out","Males-in","Males-out"]
             },
             "z" : {
                "Gender" : ["Female","Female","Male","Male"],
                "InOut" : ["In","Out","In","Out"]
             }
          },
          {
             "backgroundType" : "solid",
             "barPath" : true,
             "barPathColor" : "rgb(48,116,154)",
             "barPathTransparency" : 1,
             "colorBy" : "Color",
             "colors" : ["rgb(255,190,179)","rgb(251,153,134)","rgb(244,112,96)","rgb(230,68,72)","rgb(210,41,63)","rgb(173,18,58)"],
             "fontName" : "Waltograph",
             "fontsExternal" : [{"name" : "Waltograph","url" : "https://www.canvasxpress.org/assets/fonts/waltograph42.otf"}],
             "graphOrientation" : "horizontal",
             "graphType" : "StackedPercent",
             "layoutCollapse" : true,
             "legendBackgroundColor" : "rgb(63,149,180)",
             "legendColumns" : 2,
             "legendKeyBackgroundBorderColor" : "rgb(63,149,180)",
             "legendKeyBackgroundColor" : "rgb(63,149,180)",
             "legendPosition" : "bottom",
             "legendTextColor" : "rgb(255,255,255)",
             "legendTextScaleFontFactor" : 2,
             "marginBottom" : 10,
             "marginLeft" : 10,
             "marginRight" : 50,
             "marginTop" : 30,
             "maxTextSize" : 80,
             "objectBorderColor" : "rgba(255,255,255,0)",
             "patternBy" : "InOut",
             "patterns" : ["solid","stripeHorizontal","hatchForward","hatchReverse","stripeVertical","polkaDot"],
             "plotBackgroundColor" : "rgb(63,149,180)",
             "segregateVariablesBy" : ["Gender"],
             "showColorLegend" : false,
             "showLegend" : true,
             "showLegendTitle" : false,
             "smpTextColor" : "rgb(255,255,255)",
             "smpTextScaleFontFactor" : 1.2,
             "stripBackgroundBorderColor" : "rgba(255,255,255,0)",
             "stripBackgroundColor" : "rgba(255,255,255,0)",
             "stripTextColor" : "rgb(255,255,255)",
             "stripTextScaleFontFactor" : 2.2,
             "title" : "Fewer Role Models",
             "titleAlign" : "center",
             "titleColor" : "rgb(252,157,156)",
             "titleScaleFontFactor" : 4.5,
             "widthFactor" : 1.1,
             "xAxis2Show" : false,
             "xAxisGridMajorShow" : false,
             "xAxisGridMinorShow" : false,
             "xAxisShow" : false,
             "xAxis" : ["Females-in","Females-out","Males-in","Males-out"]
          }
        );
      </script>
    </div>

  </body>

</html>
