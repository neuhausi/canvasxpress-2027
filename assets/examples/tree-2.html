</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="tree2" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXtree2 = new CanvasXpress("tree2",
          {
             "x" : {
                "Level1" : [null,"L1","L1","L1",null],
                "Level2" : [null,null,"L2","L2",null]
             },
             "y" : {
                "data" : [
                  [1,2,3,4,5]
                ],
                "smps" : ["A","B","C","D","E"],
                "vars" : ["Order"]
             }
          },
          {
             "graphType" : "Tree",
             "hierarchy" : ["Level1","Level2"],
             "showTransition" : true,
             "title" : "Collapsible Tree",
             "xAxis": ["Order"]
          }
        );
      </script>
    </div>

  </body>

</html>
