<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="description" content="CanvasXpress: Hierarchical Relationships Visualized: Bracket Tree Layout iframe">
    <meta name="author" content="CanvasXpress Team">
    <meta name="theme-color" content="#fceecf" />
    
    <meta property="og:title" content="CanvasXpress: Tree Chart">
    <meta property="og:description" content="CanvasXpress: Hierarchical Relationships Visualized: Bracket Tree Layout iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CanvasXpress: Tree Chart">

    <link rel="canonical" href="https://www.canvasxpress.org/assets/examples/tree-6.html">

    <link rel="stylesheet" href="/dist/build.css">
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="tree6" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXtree6 = new CanvasXpress("tree6",
          {
            "x" : {
              "Final": ["I", "I", "I", "I", "I", "I", "I", "I", "I", "I", "I", "I", "I", "I", "I", "I"],
              "Semifinal": ["A", "A", "A", "A", "A", "A", "A", "A", "I", "I", "I", "I", "I", "I", "I", "I"],
              "4th" : ["A","A","A","A","G","G","G","G","I","I","I","I","N","N","N","N"],
              "8th" : ["A","A","C","C","E","E","G","G","I","I","K","K","N","N","O","O"]
            },
            "y" : {
              "data" : [
                [37,12,23,14,25,16,27,18,39,20,31,22,31,34,25,26]
              ],
              "smps" : ["A","B","C","D","E","F","G","H","I","J","K","L","M","N","O","P"],
              "vars" : ["Goals"]
            }
          },
          {
            "graphType": "Tree",
            "hierarchy": [ "Final", "Semifinal", "4th", "8th" ],
            "treeType": "bracket",
            "treeInverted": true,
            "showTransition": false,
            "treeNodeSizeScaleFactor": 4,
            "treeClickDisable": true,
            "treeBracketLabelAlign": "left",
            "title": "Bracket",
            "xAxis": [ "Goals" ]
          }
        );
      </script>
    </div>

  </body>

</html>
