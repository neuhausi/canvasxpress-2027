</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="venn1" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXvenn1 = new CanvasXpress("venn1",
          {
             "venn" : {
                "data" : {
                   "A" : 340,
                   "AB" : 639,
                   "ABC" : 552,
                   "ABCD" : 148,
                   "ABD" : 578,
                   "AC" : 456,
                   "ACD" : 298,
                   "AD" : 257,
                   "B" : 562,
                   "BC" : 915,
                   "BCD" : 613,
                   "BD" : 354,
                   "C" : 620,
                   "CD" : 143,
                   "D" : 592
                },
                "legend" : {
                   "A" : "List 1",
                   "B" : "List 2",
                   "C" : "List 3",
                   "D" : "List 4"
                }
             }
          },
          {
             "graphType" : "Venn",
             "showTransition" : false,
             "vennGroups" : 4
          }
        );
      </script>
    </div>

  </body>

</html>
