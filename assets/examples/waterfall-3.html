<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="CanvasXpress: Tumor Shrinkage: Efficacy Dataset Waterfall iframe">
    <meta name="author" content="CanvasXpress Team">
    <meta name="theme-color" content="#fceecf" />
    
    <meta property="og:title" content="CanvasXpress: Waterfall Chart">
    <meta property="og:description" content="CanvasXpress: Tumor Shrinkage: Efficacy Dataset Waterfall iframe">
    <meta property="og:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">
    <meta property="og:url" content="https://www.canvasxpress.org/assets/examples/waterfall-3.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="CanvasXpress">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CanvasXpress: Waterfall Chart">
    <meta name="twitter:description" content="CanvasXpress: Tumor Shrinkage: Efficacy Dataset Waterfall iframe">
    <meta name="twitter:image" content="https://www.canvasxpress.org/assets/images/hexagon.png">

    <link rel="stylesheet" href="/dist/build.css">
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="apple-canvasxpress.png" />

    <link rel="stylesheet" href="/dist/canvasXpress.css" type="text/css" />
    <script type="text/javascript" src="/dist/canvasXpress.min.js"></script>
</head>

  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="waterfall3" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXwaterfall3 = new CanvasXpress("waterfall3",
          {
             "x" : {
                "Status" : ["PD","PD","PD","PD","PD","PD","SD","PD","PD","PD","PD","PD","SD","SD","SD","PR"],
                "Tissue" : ["Pancreas","Pancreas","Pancreas","Colrectal","Breast","Colrectal","Colrectal","Colrectal","Billiary tract","Colrectal","Esophagus","Billiary tract","Billiary tract","Billiary tract","Colrectal","Billiary tract"]
             },
             "y" : {
                "data" : [
                  [115,75,39,23,22,15,12,10,10,10,5,4,2,-8,-11,-31]
                ],
                "smps" : ["1001","1002","1003","1004","1005","1006","1007","1008","1009","1010","1011","1012","1013","1014","1015","1016"],
                "vars" : ["Shrinkage"]
             }
          },
          {
             "colorBy" : "Tissue",
             "colorScheme" : "NEJM",
             "graphOrientation" : "vertical",
             "graphType" : "Bar",
             "legendInside" : true,
             "legendKeyBackgroundBorderColor" : "rgba(255,255,255,0)",
             "legendKeyBackgroundColor" : "rgba(255,255,255,0)",
             "legendPosition" : "topRight",
             "showSampleNames" : false,
             "smpOverlayProperties" : {
                "Status" : {
                   "position" : "bottom",
                   "scheme" : "White"
                }
             },
             "smpOverlays" : ["Status"],
             "title" : "Clinical Trial",
             "xAxis2Show" : false,
             "xAxisTitle" : "Best tumor shrinkage (%)",
             "xAxis" : ["Shrinkage"]
          }
        );
      </script>
    </div>

  </body>

</html>
