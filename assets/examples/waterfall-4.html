  <body>

    <div class="content">
      <div class="container" style="margin:auto;display:flex;justify-content:center;align-items:center;height:100vh;">
        <div class="plot">
          <canvas id="waterfall4" width="600" height="600" data-aspectRatio="1:1" data-responsive="true"></canvas>
        </div>
      </div>
      <script>
        var cXwaterfall4 = new CanvasXpress("waterfall4",
          {
             "y" : {
                "data" : [
                  [83,-44,55,-60,40,0]
                ],
                "smps" : ["S1","S2","S3","S4","S5","S6"],
                "vars" : ["V1"]
             }
          },
          {
            "graphOrientation": "vertical",
            "graphType": "Waterfall",
            "showLegend": false,
            "smpTextRotate": 90,
            "smpTitle": "Samples",
            "title": "Traditional Waterfall",
            "xAxis": ["V1"],
            "xAxisTitle": "Value"
          }
        );
      </script>
    </div>

  </body>

</html>
